<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>深海水母漫游 - 荧光裂谷</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23010712'/%3E%3Cpath d='M14 30c1-12 9-19 18-19s17 7 18 19c-6 6-30 6-36 0z' fill='%237af4ff'/%3E%3Cpath d='M20 35c-5 7 1 11-3 18M29 36c-2 8 3 11 0 18M38 36c2 8-3 11 0 18M47 35c5 7-1 11 3 18' stroke='%23b99cff' stroke-width='4' stroke-linecap='round' fill='none'/%3E%3C/svg%3E" />
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, "SF Pro Display", "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      --cyan: #79f4ff;
      --cyan-soft: rgba(121, 244, 255, 0.72);
      --violet: #b99cff;
      --amber: #ffd182;
      --coral: #ff7f9e;
      --mint: #76ffd2;
      --panel: rgba(2, 13, 25, 0.42);
      --line: rgba(133, 235, 255, 0.28);
      --text: rgba(235, 253, 255, 0.94);
      --muted: rgba(190, 229, 237, 0.7);
    }

    * { box-sizing: border-box; }

    html, body, #app {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #010711;
    }

    body {
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      outline: none;
    }

    #app::before,
    #app::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    #app::before {
      background:
        radial-gradient(circle at 50% 58%, transparent 0 36%, rgba(0, 2, 9, 0.22) 62%, rgba(0, 0, 0, 0.64) 100%),
        linear-gradient(180deg, rgba(4, 56, 86, 0.14), transparent 35%, rgba(0, 0, 0, 0.36));
      mix-blend-mode: multiply;
    }

    #app::after {
      background:
        linear-gradient(90deg, rgba(0,0,0,.34), transparent 19%, transparent 81%, rgba(0,0,0,.34)),
        repeating-linear-gradient(90deg, rgba(121,244,255,.025) 0 1px, transparent 1px 90px);
      opacity: .55;
    }

    .hud {
      position: fixed;
      z-index: 4;
      color: var(--text);
      pointer-events: none;
      text-shadow: 0 0 14px rgba(97, 228, 255, 0.22);
    }

    .left-hud {
      top: 28px;
      left: 32px;
      display: grid;
      grid-template-columns: 84px 250px;
      gap: 18px;
      align-items: start;
    }

    .jelly-medallion {
      position: relative;
      width: 84px;
      height: 84px;
      border: 1px solid rgba(180, 242, 255, .38);
      border-radius: 50%;
      background:
        radial-gradient(circle at 48% 36%, rgba(255,255,255,.9), transparent 10%),
        radial-gradient(circle at 50% 45%, rgba(121,244,255,.6), rgba(23,91,126,.16) 48%, rgba(0,0,0,.08) 70%);
      box-shadow:
        0 0 30px rgba(121,244,255,.24),
        inset 0 0 26px rgba(121,244,255,.18);
    }

    .jelly-medallion::before {
      content: "";
      position: absolute;
      left: 21px;
      top: 18px;
      width: 42px;
      height: 25px;
      border-radius: 50% 50% 42% 42%;
      border: 1px solid rgba(230, 255, 255, .62);
      background: radial-gradient(circle at 50% 20%, #fff, #77f4ff 34%, rgba(80,205,255,.15) 75%);
      box-shadow: 0 0 24px rgba(121,244,255,.66);
    }

    .jelly-medallion::after {
      content: "";
      position: absolute;
      left: 27px;
      top: 43px;
      width: 30px;
      height: 26px;
      background:
        linear-gradient(90deg, transparent 0 10%, rgba(185,156,255,.88) 10% 14%, transparent 14% 28%, rgba(121,244,255,.9) 28% 32%, transparent 32% 48%, rgba(230,255,255,.72) 48% 52%, transparent 52% 68%, rgba(121,244,255,.9) 68% 72%, transparent 72% 86%, rgba(185,156,255,.88) 86% 90%, transparent 90%);
      filter: drop-shadow(0 0 8px rgba(121,244,255,.75));
    }

    .status-lines {
      display: grid;
      gap: 12px;
      padding-top: 8px;
    }

    .status-row {
      display: grid;
      grid-template-columns: 24px 1fr 48px;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0;
    }

    .status-icon {
      width: 20px;
      height: 20px;
      display: grid;
      place-items: center;
      color: var(--cyan);
      font-size: 20px;
      line-height: 1;
      filter: drop-shadow(0 0 8px rgba(121,244,255,.5));
    }

    .meter {
      height: 7px;
      border: 1px solid rgba(121,244,255,.18);
      background: rgba(20, 80, 102, .18);
      box-shadow: inset 0 0 12px rgba(0,0,0,.45);
      overflow: hidden;
    }

    .meter span {
      display: block;
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #6ef2ff, #b99cff);
      box-shadow: 0 0 18px rgba(121,244,255,.85);
      transform-origin: left;
    }

    .status-row.combo .meter span {
      background: linear-gradient(90deg, #76ffd2, #ffd182 48%, #ff7f9e);
      box-shadow: 0 0 18px rgba(255,209,130,.72);
    }

    .status-row.danger .meter span {
      background: linear-gradient(90deg, #ff7f9e, #ffd182);
      box-shadow: 0 0 18px rgba(255,127,158,.7);
    }

    .status-value {
      color: var(--text);
      font-weight: 700;
      text-align: right;
      font-size: 13px;
    }

    .depth-readout {
      margin-top: 8px;
      color: rgba(219, 250, 255, .72);
      font-size: 21px;
      letter-spacing: 0;
    }

    .depth-readout span {
      display: inline-block;
      color: var(--cyan);
      margin-right: 9px;
    }

    .right-hud {
      top: 30px;
      right: 36px;
      width: 196px;
      height: 196px;
    }

    .radar {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 1px solid rgba(203, 247, 255, .24);
      background:
        radial-gradient(circle, transparent 0 15%, rgba(121,244,255,.08) 15.5% 16.5%, transparent 17% 31%, rgba(121,244,255,.08) 31.5% 32.5%, transparent 33% 48%, rgba(121,244,255,.08) 48.5% 49.5%, transparent 50%),
        conic-gradient(from 12deg, rgba(121,244,255,.18), transparent 26%, transparent 74%, rgba(185,156,255,.12));
      box-shadow: inset 0 0 26px rgba(121,244,255,.07), 0 0 22px rgba(0,0,0,.24);
    }

    .radar::before,
    .radar::after {
      content: "";
      position: absolute;
      inset: 50% auto auto 50%;
      width: 1px;
      height: 46%;
      background: linear-gradient(var(--cyan-soft), transparent);
      transform-origin: 0 0;
    }

    .radar::before { transform: rotate(78deg); }
    .radar::after { transform: rotate(164deg); opacity: .45; }

    .radar-arrow {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 18px solid rgba(204, 251, 255, .88);
      filter: drop-shadow(0 0 10px rgba(121,244,255,.65));
      transform: translate(-50%, -56%) rotate(var(--radar-angle, 0deg));
    }

    .radar-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 14px var(--cyan);
      transform: translate(-50%, -50%);
    }

    .radar-dot.amber {
      background: var(--amber);
      box-shadow: 0 0 14px var(--amber);
    }

    .radar-dot.predator {
      width: 10px;
      height: 10px;
      background: var(--coral);
      box-shadow: 0 0 16px var(--coral);
    }

    .radar-dot.leviathan {
      width: 14px;
      height: 14px;
      background: var(--coral);
      border: 1px solid rgba(255,255,255,.62);
      box-shadow: 0 0 22px var(--coral);
    }

    .radar-dot.gate {
      width: 11px;
      height: 11px;
      border: 1px solid rgba(255,255,255,.75);
      background: var(--mint);
      box-shadow: 0 0 18px var(--mint);
    }

    .radar-dot.sanctuary {
      width: 7px;
      height: 7px;
      background: var(--mint);
      box-shadow: 0 0 12px var(--mint);
      opacity: .72;
    }

    .objective-strip {
      position: fixed;
      right: 48px;
      top: 236px;
      z-index: 4;
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(220, 251, 255, .74);
      font-size: 13px;
      letter-spacing: 0;
    }

    .objective-strip i {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 12px var(--cyan);
    }

    .objective-strip b {
      color: var(--text);
      font-size: 14px;
    }

    .objective-strip strong {
      color: var(--mint);
      font-size: 14px;
      font-weight: 800;
    }

    .mission-strip {
      position: fixed;
      right: 48px;
      top: 262px;
      z-index: 4;
      width: min(330px, calc(100vw - 96px));
      display: grid;
      gap: 6px;
      color: rgba(220, 251, 255, .78);
      font-size: 12px;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(121,244,255,.24);
    }

    .mission-strip b {
      color: var(--amber);
      font-size: 13px;
    }

    .mission-bar {
      height: 4px;
      border: 1px solid rgba(133, 235, 255, .2);
      background: rgba(3, 16, 27, .45);
      overflow: hidden;
    }

    .mission-bar span {
      display: block;
      height: 100%;
      width: 100%;
      transform-origin: left;
      background: linear-gradient(90deg, var(--mint), var(--amber));
      box-shadow: 0 0 12px rgba(255,209,130,.62);
    }

    .boss-strip {
      position: fixed;
      z-index: 5;
      left: 50%;
      top: 48px;
      width: min(520px, calc(100vw - 72px));
      display: grid;
      gap: 6px;
      color: rgba(232, 251, 255, .86);
      text-align: center;
      transform: translateX(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity .24s ease;
      text-shadow: 0 0 16px rgba(255,127,158,.34);
    }

    .boss-strip.show {
      opacity: 1;
    }

    .boss-strip b {
      color: var(--coral);
      font-size: 13px;
      letter-spacing: 0;
    }

    .boss-bar {
      height: 5px;
      border: 1px solid rgba(255,127,158,.34);
      background: rgba(40, 5, 18, .42);
      box-shadow: inset 0 0 14px rgba(0,0,0,.42);
      overflow: hidden;
    }

    .boss-bar span {
      display: block;
      height: 100%;
      width: 100%;
      transform-origin: left;
      background: linear-gradient(90deg, #ff7f9e, #ffd182);
      box-shadow: 0 0 18px rgba(255,127,158,.8);
    }

    .combo-toast {
      position: fixed;
      z-index: 5;
      left: 50%;
      top: 86px;
      display: grid;
      gap: 3px;
      color: rgba(235, 253, 255, .9);
      text-align: center;
      transform: translateX(-50%);
      pointer-events: none;
      opacity: .92;
      text-shadow: 0 0 12px rgba(255,209,130,.35);
    }

    .combo-toast b {
      color: var(--amber);
      font-size: 22px;
      letter-spacing: 0;
    }

    .combo-toast span {
      color: rgba(225, 250, 255, .65);
      font-size: 11px;
    }

    .control-bar {
      position: fixed;
      z-index: 4;
      left: 50%;
      bottom: 26px;
      display: flex;
      gap: 16px;
      align-items: center;
      color: rgba(224, 250, 255, .72);
      font-size: 12px;
      transform: translateX(-50%);
      text-shadow: 0 0 10px rgba(121,244,255,.28);
      pointer-events: none;
    }

    .key {
      min-width: 44px;
      height: 24px;
      padding: 0 9px;
      display: inline-grid;
      place-items: center;
      border: 1px solid rgba(208, 251, 255, .42);
      border-radius: 4px;
      color: rgba(237, 254, 255, .9);
      background: rgba(5, 22, 34, .54);
      box-shadow: inset 0 0 10px rgba(121,244,255,.09), 0 0 18px rgba(0,0,0,.26);
      font-weight: 700;
    }

    .message {
      position: fixed;
      z-index: 6;
      left: 50%;
      top: 38%;
      width: min(420px, calc(100vw - 44px));
      padding: 13px 16px;
      text-align: center;
      color: var(--text);
      font-size: 14px;
      background: rgba(2, 13, 25, .66);
      border: 1px solid rgba(133, 235, 255, .24);
      border-radius: 8px;
      backdrop-filter: blur(12px);
      opacity: 0;
      transform: translate(-50%, -44%) scale(.96);
      pointer-events: none;
      transition: opacity .24s ease, transform .24s ease;
    }

    .message.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .screen-flash {
      position: fixed;
      inset: 0;
      z-index: 3;
      background: radial-gradient(circle at 50% 55%, rgba(150,255,255,.32), rgba(185,156,255,.1) 34%, transparent 64%);
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease;
      mix-blend-mode: screen;
    }

    .screen-flash.hit {
      background: radial-gradient(circle at 50% 50%, rgba(255,127,158,.34), rgba(255,209,130,.12) 36%, transparent 68%);
    }

    .screen-flash.show {
      opacity: 1;
      transition-duration: .06s;
    }

    .storm-overlay {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at 50% 45%, transparent 0 30%, rgba(4, 14, 28, .28) 62%, rgba(0,0,0,.62) 100%),
        linear-gradient(105deg, transparent 0 32%, rgba(121,244,255,.08) 38%, transparent 44% 100%),
        repeating-linear-gradient(72deg, rgba(121,244,255,.045) 0 1px, transparent 1px 38px);
      mix-blend-mode: screen;
      transition: opacity .45s ease;
    }

    .upgrade-panel {
      position: fixed;
      z-index: 8;
      left: 50%;
      bottom: 88px;
      width: min(640px, calc(100vw - 34px));
      padding: 14px;
      color: var(--text);
      border: 1px solid rgba(133, 235, 255, .28);
      border-radius: 8px;
      background: rgba(1, 12, 24, .76);
      box-shadow: 0 20px 80px rgba(0,0,0,.42), inset 0 0 32px rgba(121,244,255,.06);
      backdrop-filter: blur(16px);
      transform: translate(-50%, 18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease, transform .22s ease;
    }

    .upgrade-panel.show {
      opacity: 1;
      transform: translate(-50%, 0);
      pointer-events: auto;
    }

    .upgrade-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 10px;
      color: rgba(229, 253, 255, .82);
      font-size: 12px;
    }

    .upgrade-title b {
      color: var(--mint);
      font-size: 15px;
    }

    .upgrade-options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .upgrade-option {
      min-height: 92px;
      padding: 10px;
      border: 1px solid rgba(133, 235, 255, .24);
      border-radius: 7px;
      color: var(--text);
      background: linear-gradient(180deg, rgba(9, 38, 54, .72), rgba(2, 13, 25, .76));
      font: 600 12px/1.35 Inter, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      text-align: left;
      cursor: pointer;
    }

    .upgrade-option b {
      display: block;
      margin-bottom: 5px;
      color: var(--amber);
      font-size: 13px;
    }

    .upgrade-option span {
      color: rgba(222, 250, 255, .66);
      font-weight: 500;
    }

    .intro-panel {
      position: fixed;
      inset: 0;
      z-index: 12;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 44%, rgba(121,244,255,.12), transparent 0 34%),
        radial-gradient(circle at 50% 56%, rgba(1, 9, 18, .5), rgba(0,0,0,.82) 72%);
      backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s ease;
    }

    .intro-panel.show {
      opacity: 1;
      pointer-events: auto;
    }

    .intro-box {
      width: min(680px, calc(100vw - 34px));
      padding: 22px;
      border: 1px solid rgba(133, 235, 255, .3);
      border-radius: 8px;
      background: rgba(1, 12, 24, .78);
      box-shadow: 0 24px 90px rgba(0,0,0,.48), inset 0 0 36px rgba(121,244,255,.07);
    }

    .intro-box h1 {
      margin: 0 0 10px;
      color: rgba(238, 255, 255, .96);
      font-size: 28px;
      font-weight: 850;
      letter-spacing: 0;
    }

    .intro-box p {
      margin: 0 0 16px;
      color: rgba(219, 250, 255, .72);
      font-size: 14px;
      line-height: 1.65;
    }

    .intro-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9px;
      margin-bottom: 16px;
    }

    .intro-tip {
      min-height: 92px;
      padding: 11px;
      border: 1px solid rgba(133, 235, 255, .2);
      border-radius: 7px;
      background: rgba(7, 32, 48, .48);
      color: rgba(225, 250, 255, .7);
      font-size: 12px;
      line-height: 1.45;
    }

    .intro-tip b {
      display: block;
      margin-bottom: 6px;
      color: var(--amber);
      font-size: 13px;
    }

    .intro-start {
      width: 100%;
      height: 42px;
      border: 1px solid rgba(133, 235, 255, .42);
      border-radius: 7px;
      color: rgba(3, 18, 28, .95);
      background: linear-gradient(90deg, var(--mint), var(--cyan), var(--amber));
      box-shadow: 0 0 24px rgba(121,244,255,.28);
      font: 850 14px/1 Inter, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      cursor: pointer;
      transition: transform .14s ease, filter .16s ease, box-shadow .16s ease, border-color .16s ease;
    }

    .audio-toggle {
      position: fixed;
      z-index: 7;
      right: 34px;
      bottom: 84px;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(133, 235, 255, .36);
      border-radius: 50%;
      color: var(--text);
      background: rgba(3, 16, 27, .62);
      box-shadow: inset 0 0 14px rgba(121,244,255,.1), 0 0 22px rgba(0,0,0,.34);
      font: 800 18px/1 Inter, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: transform .14s ease, color .16s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease;
    }

    .audio-toggle[aria-pressed="false"] {
      color: rgba(224, 250, 255, .46);
      border-color: rgba(133, 235, 255, .18);
      box-shadow: inset 0 0 10px rgba(121,244,255,.05), 0 0 14px rgba(0,0,0,.24);
    }

    .intro-start:hover,
    .audio-toggle:hover,
    .touch-actions button:hover,
    .upgrade-option:hover {
      border-color: rgba(226, 253, 255, .62);
      filter: brightness(1.08);
      box-shadow: inset 0 0 18px rgba(121,244,255,.13), 0 0 30px rgba(121,244,255,.24);
    }

    .intro-start:active,
    .audio-toggle:active,
    .touch-actions button:active,
    .touch-actions button.is-pressed,
    .upgrade-option:active {
      transform: translateY(1px) scale(.98);
    }

    .touch {
      display: none;
      position: fixed;
      z-index: 5;
      inset: auto 18px 18px 18px;
      align-items: flex-end;
      justify-content: space-between;
      pointer-events: none;
    }

    .stick {
      position: relative;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      border: 1px solid rgba(133, 235, 255, .32);
      background: radial-gradient(circle, rgba(121,244,255,.12), rgba(3,16,27,.34) 64%, rgba(3,16,27,.1));
      box-shadow: inset 0 0 30px rgba(121,244,255,.12);
      pointer-events: auto;
      touch-action: none;
    }

    .thumb {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(226, 253, 255, .58);
      background: rgba(121,244,255,.24);
      box-shadow: 0 0 24px rgba(121,244,255,.48);
      transform: translate(-50%, -50%);
    }

    .touch-actions {
      display: grid;
      gap: 8px;
      pointer-events: auto;
    }

    .touch-actions button {
      width: 74px;
      height: 38px;
      border: 1px solid rgba(133, 235, 255, .36);
      border-radius: 8px;
      color: var(--text);
      background: rgba(3, 16, 27, .62);
      font: 700 13px/1 Inter, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      transition: transform .14s ease, background .16s ease, box-shadow .16s ease, border-color .16s ease;
    }

    @media (max-width: 760px) {
      .left-hud {
        left: 14px;
        top: 14px;
        grid-template-columns: 58px minmax(0, 1fr);
        width: calc(100vw - 28px);
        gap: 11px;
      }

      .jelly-medallion {
        width: 58px;
        height: 58px;
      }

      .jelly-medallion::before {
        left: 15px;
        top: 13px;
        width: 28px;
        height: 18px;
      }

      .jelly-medallion::after {
        left: 17px;
        top: 32px;
        width: 24px;
        height: 18px;
      }

      .status-lines {
        gap: 8px;
        padding-top: 1px;
      }

      .status-row {

function createAbyssBackdrop() {
  const material = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    depthWrite: false,
    uniforms: {
      top: { value: new THREE.Color(0x0d78a2) },
      mid: { value: new THREE.Color(0x06304a) },
      low: { value: new THREE.Color(0x010814) }
    },
    vertexShader: `
      varying vec3 vWorld;
      void main() {
        vec4 world = modelMatrix * vec4(position, 1.0);
        vWorld = world.xyz;
        gl_Position = projectionMatrix * viewMatrix * world;
      }
    `,
    fragmentShader: `
      uniform vec3 top;
      uniform vec3 mid;
      uniform vec3 low;
      varying vec3 vWorld;
      void main() {
        vec3 n = normalize(vWorld);
        float h = n.y * 0.5 + 0.5;
        vec3 color = mix(low, mid, smoothstep(0.04, 0.52, h));
        color = mix(color, top, smoothstep(0.66, 1.0, h));
        float trench = smoothstep(0.2, 0.95, length(n.xz));
        color *= 1.0 - trench * 0.32;
        gl_FragColor = vec4(color, 1.0);
      }
    `
  });
  return new THREE.Mesh(new THREE.SphereGeometry(560, 64, 32), material);
}

function createVolumeCurtains() {
  const group = new THREE.Group();
  for (let i = 0; i < 14; i += 1) {
    const material = new THREE.MeshBasicMaterial({
      map: beamTexture,
      color: i % 3 === 0 ? 0xa7eaff : 0x64d8ff,
      transparent: true,
      opacity: 0.16 + Math.random() * 0.1,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide
    });
    const beam = new THREE.Mesh(new THREE.PlaneGeometry(18 + Math.random() * 18, 170 + Math.random() * 60), material);
    beam.position.set(-125 + i * 20 + Math.random() * 10, 7 + Math.random() * 8, -135 + (i % 5) * 55);
    beam.rotation.y = THREE.MathUtils.degToRad(-22 + Math.random() * 44);
    beam.rotation.z = THREE.MathUtils.degToRad(-4 + Math.random() * 8);
    beam.userData.baseOpacity = material.opacity;
    group.add(beam);
  }
  return group;
}

function createStormVeils() {
  const group = new THREE.Group();
  const veils = [];
  for (let i = 0; i < 20; i += 1) {
    const material = new THREE.MeshBasicMaterial({
      map: beamTexture,
      color: i % 4 === 0 ? 0xffd182 : i % 3 === 0 ? 0xb99cff : 0x79f4ff,
      transparent: true,
      opacity: 0,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide
    });
    const veil = new THREE.Mesh(new THREE.PlaneGeometry(14 + Math.random() * 20, 130 + Math.random() * 70), material);
    veil.position.set(THREE.MathUtils.randFloatSpread(340), THREE.MathUtils.randFloat(-18, 58), THREE.MathUtils.randFloatSpread(340));
    veil.rotation.set(THREE.MathUtils.randFloatSpread(0.22), THREE.MathUtils.randFloat(0, Math.PI), THREE.MathUtils.degToRad(58 + Math.random() * 22));
    veil.userData = {
      speed: THREE.MathUtils.randFloat(10, 22),
      stormOpacity: THREE.MathUtils.randFloat(0.05, 0.16),
      phase: Math.random() * Math.PI * 2
    };
    group.add(veil);
    veils.push(veil);
  }
  return { group, veils };
}

function createCanyonWorld() {
  const group = new THREE.Group();
  const floorMaterial = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    uniforms: {
      nearColor: { value: new THREE.Color(0x08435c) },
      farColor: { value: new THREE.Color(0x02101d) }
    },
    vertexShader: `
      varying vec3 vWorld;
      varying vec2 vUv;
      void main() {
        vUv = uv;
        vec4 world = modelMatrix * vec4(position, 1.0);
        vWorld = world.xyz;
        gl_Position = projectionMatrix * viewMatrix * world;
      }
    `,
    fragmentShader: `
      uniform vec3 nearColor;
      uniform vec3 farColor;
      varying vec3 vWorld;
      varying vec2 vUv;
      void main() {
        float d = length(vWorld.xz);
        float ridges = sin(vWorld.x * 0.07) * 0.5 + cos(vWorld.z * 0.055) * 0.5;
        vec3 color = mix(nearColor, farColor, smoothstep(34.0, 220.0, d));
        color += ridges * vec3(0.006, 0.025, 0.035);
        float alpha = 0.92 * (1.0 - smoothstep(110.0, 248.0, d));
        alpha *= smoothstep(0.0, 0.08, vUv.x) * smoothstep(0.0, 0.08, vUv.y);
        alpha *= smoothstep(0.0, 0.08, 1.0 - vUv.x) * smoothstep(0.0, 0.08, 1.0 - vUv.y);
        gl_FragColor = vec4(color, alpha);
      }
    `
  });

  const floor = new THREE.Mesh(new THREE.PlaneGeometry(540, 540, 34, 34), floorMaterial);
  const pos = floor.geometry.attributes.position;
  for (let i = 0; i < pos.count; i += 1) {
    const x = pos.getX(i);
    const y = pos.getY(i);
    pos.setZ(i, Math.sin(x * 0.035) * 1.8 + Math.cos(y * 0.027) * 2.4 + noise(i * 1.7) * 2.8);
  }
  floor.geometry.computeVertexNormals();
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = world.floor;

function createPlayerJellyfish() {
  const group = new THREE.Group();
  const uniforms = {
    time: { value: 0 },
    pulse: { value: 0 },
    stress: { value: 0 }
  };

  const halo = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glowTexture,
    color: 0x79f4ff,
    transparent: true,
    opacity: 0.26,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  }));
  halo.scale.set(8.8, 8.0, 1);
  halo.position.y = 0.25;
  group.add(halo);

  const bellMaterial = new THREE.ShaderMaterial({
    uniforms,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    vertexShader: `
      uniform float time;
      uniform float pulse;
      varying vec3 vNormal;
      varying vec3 vWorld;
      varying vec2 vUv;
      void main() {
        vUv = uv;
        vNormal = normalize(normalMatrix * normal);
        vec3 p = position;
        float rim = smoothstep(-1.45, 0.55, -p.y);
        float wave = sin((p.y * 5.0) + time * 4.2) * 0.046;
        p.xz *= 1.0 + wave + pulse * (0.17 + rim * 0.13);
        p.y *= 1.0 - pulse * 0.08;
        vec4 world = modelMatrix * vec4(p, 1.0);
        vWorld = world.xyz;
        gl_Position = projectionMatrix * viewMatrix * world;
      }
    `,
    fragmentShader: `
      uniform float pulse;
      uniform float stress;
      varying vec3 vNormal;
      varying vec3 vWorld;
      varying vec2 vUv;
      void main() {
        float fresnel = pow(1.0 - abs(dot(normalize(vNormal), vec3(0.0, 0.0, 1.0))), 2.0);
        float veins = abs(sin(vUv.x * 48.0 + vUv.y * 10.0)) * smoothstep(0.25, 0.9, vUv.y);
        float vertical = smoothstep(-1.6, 1.7, vWorld.y);
        vec3 core = mix(vec3(0.035, 0.58, 0.8), vec3(0.82, 0.97, 1.0), vertical);
        vec3 color = mix(core, vec3(0.9, 0.62, 1.0), pulse * 0.7);
        color = mix(color, vec3(1.0, 0.45, 0.2), stress * 0.5);
        color += veins * vec3(0.16, 0.24, 0.35);
        float alpha = 0.3 + fresnel * 0.56 + pulse * 0.16;
        gl_FragColor = vec4(color * (0.82 + fresnel * 1.62 + pulse * 0.72), alpha * 0.86);
      }
    `
  });

  const bell = new THREE.Mesh(new THREE.SphereGeometry(2.08, 76, 38, 0, Math.PI * 2, 0, Math.PI * 0.68), bellMaterial);
  bell.scale.set(1.14, 0.72, 1.14);
  bell.position.y = 0.84;

  const rim = new THREE.Mesh(
    new THREE.TorusGeometry(2.1, 0.035, 10, 150),

      transparent: true,
      opacity: 0.44,
      blending: THREE.AdditiveBlending,

    })

  rim.rotation.x = Math.PI / 2;

    skirtLobes.push(lobe);
  }
  group.add(skirt);

  const inner = new THREE.Mesh(

      color: 0xcdfdff,

    })
  );
  inner.scale.set(0.74, 1.35, 0.74);

  const veinLines = [];

  });
  for (let i = 0; i < 18; i += 1) {

    }

  const arms = new THREE.Group();

    group.add(line);
  }

  const pulseRings = [];
  const ringMaterial = new THREE.MeshBasicMaterial({
    color: 0x9ffbff,
    transparent: true,
    opacity: 0,
    blending: THREE.AdditiveBlending,
    depthWrite: false,

  });
  for (let i = 0; i < 3; i += 1) {
    const ring = new THREE.Mesh(new THREE.TorusGeometry(2.1, 0.012, 8, 100), ringMaterial.clone());
    ring.rotation.x = Math.PI / 2;
    ring.position.y = -0.3 - i * 0.08;
    ring.userData = { offset: i / 3 };
    group.add(ring);
    pulseRings.push(ring);
  }

  const tentacles = [];
  const lineMaterials = [
    new THREE.LineBasicMaterial({ color: 0x9ffbff, transparent: true, opacity: 0.72, blending: THREE.AdditiveBlending, depthWrite: false }),
    new THREE.LineBasicMaterial({ color: 0xb99cff, transparent: true, opacity: 0.58, blending: THREE.AdditiveBlending, depthWrite: false }),

  for (let i = 0; i < 46; i += 1) {

    group.add(line);
  }

  return { group, bell, rim, skirt, skirtLobes, inner, veinLines, arms, ribbonArms, pulseRings, halo, tentacles, uniforms };
}

function updateTentacle(tentacle, time) {
  const attr = tentacle.line.geometry.attributes.position;
  const drift = tmp.copy(player.velocity).multiplyScalar(0.1 * tentacle.drift);
  const baseX = Math.cos(tentacle.angle) * tentacle.baseRadius;
  const baseZ = Math.sin(tentacle.angle) * tentacle.baseRadius;
  for (let i = 0; i < tentacle.points; i += 1) {
    const p = i / (tentacle.points - 1);
    const swim = player.intent.lengthSq() > 0.04 ? 1.25 : 0.82;
    const pulseKick = player.pulse * (1.0 - p) * 0.45;
    const curl = Math.sin(time * (2.08 + tentacle.sway * 0.35) + p * 8.5 + tentacle.phase) * p * p * swim;
    const cross = Math.cos(time * (1.7 + tentacle.sway * 0.28) + p * 6.3 + tentacle.phase) * p * p * swim;
    attr.setXYZ(
      i,
      baseX + curl * 0.42 - drift.x * p * 0.3,
      -0.42 - tentacle.length * p + Math.sin(p * Math.PI + time * 1.35 + tentacle.phase) * 0.17 + pulseKick,
      baseZ + cross * 0.42 - drift.z * p * 0.3
    );
  }
  attr.needsUpdate = true;
}

function createPlanktonField() {
  const count = 6200;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const color = new THREE.Color();
  for (let i = 0; i < count; i += 1) {
    const stream = i % 6 === 0;
    if (stream) {
      const lane = Math.floor(i / 6) % 7;
      const z = -150 + (i % 420) * 0.62;
      positions[i * 3] = Math.sin(z * 0.035 + lane) * 18 + (lane - 3) * 12;
      positions[i * 3 + 1] = -8 + Math.sin(z * 0.05 + lane) * 13 + Math.random() * 8;
      positions[i * 3 + 2] = z;
    } else {
      positions[i * 3] = THREE.MathUtils.randFloatSpread(410);
      positions[i * 3 + 1] = THREE.MathUtils.randFloat(-80, 72);
      positions[i * 3 + 2] = THREE.MathUtils.randFloatSpread(410);
    }
    const hue = stream ? 0.53 : i % 11 === 0 ? 0.74 : 0.54 + Math.random() * 0.08;
    color.setHSL(hue, 0.9, stream ? 0.68 : 0.48 + Math.random() * 0.3);
    colors.set([color.r, color.g, color.b], i * 3);
  }
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
  const material = new THREE.PointsMaterial({
    size: 0.155,
    vertexColors: true,
    transparent: true,
    opacity: 0.86,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true
  });
  return { points: new THREE.Points(geometry, material), positions, count };
}

function createGlowStreams() {

  for (let s = 0; s < 9; s += 1) {
    const zBase = -135 + s * 34;
    const yBase = THREE.MathUtils.randFloat(4, 30);
    const xBase = THREE.MathUtils.randFloat(-54, 58);
    const points = [];
    for (let i = 0; i < 34; i += 1) {
      const p = i / 33;
      points.push(new THREE.Vector3(
        xBase + Math.sin(p * Math.PI * 2.1 + s) * (18 + s * 1.4) + p * 40,
        yBase + Math.sin(p * Math.PI * 3 + s * 0.7) * 6,
        zBase + p * 58
      ));
    }
    const curve = new THREE.CatmullRomCurve3(points);
    const line = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(curve.getPoints(120)),
      new THREE.LineBasicMaterial({
        color: palette[s % palette.length],
        transparent: true,
        opacity: 0.2,
        blending: THREE.AdditiveBlending,
        depthWrite: false

    );
    group.add(line);

    const motes = new THREE.Group();
    for (let i = 0; i < 42; i += 1) {
      const mote = new THREE.Sprite(new THREE.SpriteMaterial({
        map: glowTexture,
        color: palette[(s + i) % palette.length],
        transparent: true,
        opacity: 0.2 + Math.random() * 0.34,

        depthWrite: false

  return { group, streams };

      stun: 0,
      biteCooldown: 0,

      fins: hunter.children.filter((child) => child.material === finMaterial)

  const sin = Math.sin(input.yaw);
  const cos = Math.cos(input.yaw);
  const x = relX * cos - relZ * sin;
  const z = relX * sin + relZ * cos;
  const distance = Math.hypot(x, z);
  const scale = Math.min(distance / maxDistance, 1);
  const angle = Math.atan2(x, -z);
  dot.style.left = `${50 + Math.sin(angle) * scale * 41}%`;
  dot.style.top = `${50 - Math.cos(angle) * scale * 41}%`;
  dot.style.opacity = `${THREE.MathUtils.clamp(1.08 - distance / maxDistance, 0.28, 0.95)}`;
}

function bindInput() {
  addEventListener("keydown", (event) => {
    if (player.introOpen) {
      if (event.code === "Enter" || event.code === "Space") {
        event.preventDefault();
        startGameFromIntro();
      }
      return;
    }
    unlockMusic();
    input.keys.add(event.code);
    if (event.code === "Space") {
      event.preventDefault();
      triggerPulse();
    }
    if (event.code === "KeyR") {
      event.preventDefault();
      triggerSonar();
    }
  });
  addEventListener("keyup", (event) => input.keys.delete(event.code));

  introStart.addEventListener("click", () => startGameFromIntro());

  canvas.addEventListener("pointerdown", (event) => {
    if (player.introOpen) return;
    unlockMusic();
    input.looking = true;
    input.lastPointer.set(event.clientX, event.clientY);
    canvas.setPointerCapture(event.pointerId);
  });
  canvas.addEventListener("pointermove", (event) => {
    if (!input.looking) return;
    const dx = event.clientX - input.lastPointer.x;
    const dy = event.clientY - input.lastPointer.y;
    input.lastPointer.set(event.clientX, event.clientY);
    input.yaw -= dx * 0.0042;
    input.pitch = THREE.MathUtils.clamp(input.pitch - dy * 0.003, -0.56, 0.42);
  });
  canvas.addEventListener("pointerup", (event) => {
    input.looking = false;
    if (canvas.hasPointerCapture(event.pointerId)) canvas.releasePointerCapture(event.pointerId);
  });
  canvas.addEventListener("pointercancel", () => { input.looking = false; });

  bindStick();
  bindTouchButton(touchUp, 1);
  bindTouchButton(touchDown, -1);
  touchPulse.addEventListener("pointerdown", (event) => {
    event.preventDefault();
    if (player.introOpen) return;
    unlockMusic();
    playSfx("click", 0.8);
    touchPulse.classList.add("is-pressed");
    touchPulse.setPointerCapture(event.pointerId);
    triggerPulse();
  });
  ["pointerup", "pointercancel", "pointerleave"].forEach((type) => {
    touchPulse.addEventListener(type, () => touchPulse.classList.remove("is-pressed"));
  });
  touchSonar.addEventListener("pointerdown", (event) => {
    event.preventDefault();
    if (player.introOpen) return;
    unlockMusic();
    playSfx("click", 0.8);
    touchSonar.classList.add("is-pressed");
    touchSonar.setPointerCapture(event.pointerId);
    triggerSonar();
  });
  ["pointerup", "pointercancel", "pointerleave"].forEach((type) => {
    touchSonar.addEventListener(type, () => touchSonar.classList.remove("is-pressed"));
  });
  audioToggle.addEventListener("click", () => {
    toggleMusic();
  });

  addEventListener("resize", resize);
}

function bindStick() {
  let pointer = null;
  const update = (event) => {
    const rect = stick.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const max = rect.width * 0.38;
    const dx = THREE.MathUtils.clamp(event.clientX - cx, -max, max);
    const dy = THREE.MathUtils.clamp(event.clientY - cy, -max, max);
    input.touchMove.set(dx / max, -dy / max);
    thumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  };

  stick.addEventListener("pointerdown", (event) => {
    unlockMusic();
    pointer = event.pointerId;
    stick.setPointerCapture(pointer);
    update(event);
  });
  stick.addEventListener("pointermove", (event) => {
    if (event.pointerId === pointer) update(event);
  });
  const reset = (event) => {
    if (event.pointerId !== pointer) return;
    pointer = null;
    input.touchMove.set(0, 0);
    thumb.style.transform = "translate(-50%, -50%)";
  };
  stick.addEventListener("pointerup", reset);
  stick.addEventListener("pointercancel", reset);
}

function bindTouchButton(button, value) {
  button.addEventListener("pointerdown", (event) => {
    event.preventDefault();
    if (player.introOpen) return;
    unlockMusic();
    playSfx("click", 0.65);
    input.touchVertical = value;
    button.classList.add("is-pressed");
    button.setPointerCapture(event.pointerId);
  });
  const release = () => {
    if (input.touchVertical === value) input.touchVertical = 0;
    button.classList.remove("is-pressed");
  };
  button.addEventListener("pointerup", release);
  button.addEventListener("pointercancel", release);
  button.addEventListener("pointerleave", release);
}

function startGameFromIntro() {
  if (!player.introOpen) return;
  player.introOpen = false;
  introPanel.classList.remove("show");
  unlockMusic(true);
  playSfx("upgrade", 0.75);
  showMessage("沿着雷达箭头寻找第一枚荧光孢子。", 1800);
}

function unlockMusic(force = false) {
  if (!force && !music.enabled) return;
  if (!music.context && !createMusicContext()) return;
  if (music.context.state === "suspended") music.context.resume();
  music.started = true;
  audioToggle.setAttribute("aria-pressed", "true");
}

function toggleMusic() {
  if (!music.started && music.enabled) {
    unlockMusic(true);
    playSfx("click", 0.9);
    showMessage("背景音乐已开启。", 900);
    return;
  }
  music.enabled = !music.enabled;
  audioToggle.setAttribute("aria-pressed", `${music.enabled}`);
  if (music.enabled) {
    unlockMusic(true);
    playSfx("click", 0.9);
    showMessage("背景音乐已开启。", 900);
  } else {
    showMessage("背景音乐已静音。", 900);
  }
}

function createMusicContext() {
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) {
    audioToggle.hidden = true;
    return false;
  }

  const ctx = new AudioContext();
  const master = ctx.createGain();
  master.gain.value = 0;
  master.connect(ctx.destination);

  const filter = ctx.createBiquadFilter();
  filter.type = "lowpass";
  filter.frequency.value = 980;
  filter.Q.value = 0.9;

  const delay = ctx.createDelay(3);
  delay.delayTime.value = 0.62;
  const feedback = ctx.createGain();
  feedback.gain.value = 0.34;
  delay.connect(feedback);
  feedback.connect(delay);
  delay.connect(master);

  const padGain = ctx.createGain();
  padGain.gain.value = 0.28;
  padGain.connect(filter);
  filter.connect(master);
  filter.connect(delay);

  const bassGain = ctx.createGain();
  bassGain.gain.value = 0.12;
  bassGain.connect(master);

  const shimmerGain = ctx.createGain();
  shimmerGain.gain.value = 0.22;
  shimmerGain.connect(delay);
  shimmerGain.connect(master);

  const pulseGain = ctx.createGain();
  pulseGain.gain.value = 1;
  pulseGain.connect(master);

  const sfxGain = ctx.createGain();
  sfxGain.gain.value = 0.82;
  sfxGain.connect(delay);
  sfxGain.connect(master);

  const noiseGain = ctx.createGain();
  noiseGain.gain.value = 0.038;
  noiseGain.connect(filter);

  const padFrequencies = [49, 73.42, 98, 146.83, 196];
  music.oscillators = padFrequencies.map((frequency, index) => {
    const gain = ctx.createGain();
    gain.gain.value = index === 0 ? 0.18 : index === 4 ? 0.045 : 0.095;
    const osc = ctx.createOscillator();
    osc.type = index === 0 ? "sine" : index === 4 ? "sine" : "triangle";
    osc.frequency.value = frequency;
    osc.connect(gain);
    gain.connect(padGain);
    osc.start();
    return { osc, gain, frequency };
  });

  const bassOsc = ctx.createOscillator();
  bassOsc.type = "sine";
  bassOsc.frequency.value = 36.71;
  bassOsc.connect(bassGain);
  bassOsc.start();
  music.oscillators.push({ osc: bassOsc, gain: bassGain, frequency: 36.71, bass: true });

  const noise = ctx.createBufferSource();
  noise.buffer = createNoiseBuffer(ctx);
  noise.loop = true;
  noise.connect(noiseGain);
  noise.start();

  music.context = ctx;
  music.master = master;
  music.padGain = padGain;
  music.bassGain = bassGain;
  music.shimmerGain = shimmerGain;
  music.pulseGain = pulseGain;
  music.sfxGain = sfxGain;
  music.noiseGain = noiseGain;
  music.filter = filter;
  music.delay = delay;
  music.noise = noise;
  return true;
}

function createNoiseBuffer(ctx) {
  const length = ctx.sampleRate * 3;
  const buffer = ctx.createBuffer(1, length, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  let last = 0;
  for (let i = 0; i < length; i += 1) {
    last = last * 0.985 + (Math.random() * 2 - 1) * 0.015;
    data[i] = last;
  }
  return buffer;
}

function updateMusic(delta, time) {
  if (!music.context) return;
  const ctx = music.context;
  const now = ctx.currentTime;
  const tension = THREE.MathUtils.clamp(storm.intensity * 0.55 + (leviathanState.active ? 0.55 : 0) + player.hazard * 0.22 + player.boostHeat * 0.12, 0, 1);
  const targetVolume = music.enabled ? 0.66 : 0;
  music.master.gain.setTargetAtTime(targetVolume, now, 0.38);
  music.filter.frequency.setTargetAtTime(760 + tension * 1200 + player.sonarWave * 520, now, 0.32);
  music.padGain.gain.setTargetAtTime(0.27 - tension * 0.055, now, 0.45);
  music.bassGain.gain.setTargetAtTime(0.105 + tension * 0.1, now, 0.28);
  music.noiseGain.gain.setTargetAtTime(0.026 + storm.intensity * 0.085 + (leviathanState.active ? 0.035 : 0), now, 0.45);

  music.stepTimer -= delta;
  if (music.stepTimer <= 0) {
    advanceMusicChord(tension);
    music.stepTimer = 6.4 - tension * 2.2;
  }

  music.shimmerTimer -= delta;
  if (music.shimmerTimer <= 0 && music.enabled) {
    playShimmer(tension);
    if (tension > 0.35) playBassPulse(tension);
    music.shimmerTimer = THREE.MathUtils.randFloat(1.9 - tension * 0.7, 4.4 - tension * 1.3);
  }
  updateProximitySound(delta);
}

function advanceMusicChord(tension) {
  if (!music.context) return;
  const now = music.context.currentTime;
  const calmChords = [
    [49, 73.42, 98, 146.83, 196],
    [55, 82.41, 110, 164.81, 220],
    [46.25, 69.3, 92.5, 138.59, 185],
    [61.74, 92.5, 123.47, 185, 246.94],
    [41.2, 61.74, 82.41, 123.47, 164.81]
  ];
  const tenseChords = [
    [51.91, 77.78, 103.83, 155.56, 207.65],
    [46.25, 69.3, 92.5, 138.59, 185],
    [58.27, 87.31, 116.54, 174.61, 233.08]
  ];
  const chords = tension > 0.42 ? tenseChords : calmChords;
  music.chordIndex = (music.chordIndex + 1) % chords.length;
  const chord = chords[music.chordIndex];
  music.oscillators.forEach((entry, index) => {
    if (entry.bass) {
      entry.osc.frequency.setTargetAtTime(chord[0] * 0.5, now, 1.2);
    } else {
      entry.osc.frequency.setTargetAtTime(chord[index % chord.length], now, 1.5);
    }
  });
}

function playShimmer(tension) {
  if (!music.context) return;
  const ctx = music.context;
  const now = ctx.currentTime;
  const scale = [196, 220, 246.94, 293.66, 329.63, 392, 440, 493.88, 587.33];
  const frequency = scale[Math.floor(Math.random() * scale.length)] * (tension > 0.5 ? 0.84 : 1);
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "sine";
  osc.frequency.setValueAtTime(frequency, now);
  osc.frequency.exponentialRampToValueAtTime(frequency * (1.01 + Math.random() * 0.08), now + 1.2);
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.082 + tension * 0.045, now + 0.08);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 2.1 + Math.random() * 1.4);
  osc.connect(gain);
  gain.connect(music.shimmerGain);
  osc.start(now);
  osc.stop(now + 3.2);
}

function playBassPulse(tension) {
  if (!music.context) return;
  const ctx = music.context;
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "sine";
  osc.frequency.setValueAtTime(42 + tension * 16, now);
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.linearRampToValueAtTime(0.09 + tension * 0.08, now + 0.05);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.62);
  osc.connect(gain);
  gain.connect(music.pulseGain);
  osc.start(now);
  osc.stop(now + 0.7);
}

function playSfx(type, intensity = 1) {
  if (!music.enabled) return;
  unlockMusic();
  if (!music.context || !music.sfxGain) return;
  const ctx = music.context;
  const now = ctx.currentTime;
  const gain = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  filter.type = "bandpass";
  filter.Q.value = 1.8;
  gain.connect(filter);
  filter.connect(music.sfxGain);

  if (type === "click") {
    filter.frequency.setValueAtTime(740, now);
    playTone(now, 620, 0.045 * intensity, 0.12, "triangle", gain);
    playTone(now + 0.025, 920, 0.025 * intensity, 0.1, "sine", gain);
    return;
  }

  if (type === "pulse") {
    filter.frequency.setValueAtTime(130, now);
    playTone(now, 86, 0.18 * intensity, 0.5, "sine", gain, 0.55);
    playNoiseBurst(now, 0.13 * intensity, 0.34, gain, 0.7);
    return;
  }

  if (type === "sonar") {
    filter.frequency.setValueAtTime(1200, now);
    playTone(now, 520, 0.12 * intensity, 0.46, "sine", gain, 1.9);
    playTone(now + 0.11, 780, 0.07 * intensity, 0.38, "sine", gain, 1.6);
    return;
  }

  if (type === "collect") {
    filter.frequency.setValueAtTime(1600, now);
    playTone(now, 880, 0.1 * intensity, 0.26, "sine", gain, 1.25);
    playTone(now + 0.055, 1320, 0.075 * intensity, 0.34, "triangle", gain, 1.16);
    return;
  }

  if (type === "memory") {
    filter.frequency.setValueAtTime(1180, now);
    playTone(now, 440, 0.08 * intensity, 0.42, "sine", gain, 1.32);
    playTone(now + 0.09, 740, 0.09 * intensity, 0.5, "sine", gain, 1.25);
    playTone(now + 0.16, 1110, 0.055 * intensity, 0.48, "sine", gain, 1.12);
    return;
  }

  if (type === "near") {
    filter.frequency.setValueAtTime(980, now);
    playTone(now, 392, 0.032 * intensity, 0.55, "sine", gain, 1.18);
    playTone(now + 0.12, 587.33, 0.024 * intensity, 0.48, "sine", gain, 1.1);
    return;
  }

  if (type === "warning") {
    filter.frequency.setValueAtTime(260, now);
    playTone(now, 120, 0.13 * intensity, 0.75, "sawtooth", gain, 0.7);
    return;
  }

  if (type === "upgrade") {
    filter.frequency.setValueAtTime(1500, now);
    playTone(now, 523.25, 0.09 * intensity, 0.34, "sine", gain, 1.4);
    playTone(now + 0.08, 783.99, 0.08 * intensity, 0.42, "sine", gain, 1.28);
    playTone(now + 0.18, 1046.5, 0.065 * intensity, 0.52, "sine", gain, 1.16);
  }
}

function playTone(start, frequency, volume, duration, type, output, sweep = 1) {
  const ctx = music.context;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(frequency, start);
  if (sweep !== 1) osc.frequency.exponentialRampToValueAtTime(Math.max(20, frequency * sweep), start + duration);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.linearRampToValueAtTime(volume, start + Math.min(0.035, duration * 0.25));
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  osc.connect(gain);
  gain.connect(output);
  osc.start(start);
  osc.stop(start + duration + 0.04);
}

function playNoiseBurst(start, volume, duration, output, cutoff = 0.5) {
  const ctx = music.context;
  const source = ctx.createBufferSource();
  source.buffer = createNoiseBuffer(ctx);
  const gain = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  filter.type = "lowpass";
  filter.frequency.value = 1200 * cutoff;
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.linearRampToValueAtTime(volume, start + 0.025);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  source.connect(filter);
  filter.connect(gain);
  gain.connect(output);
  source.start(start);
  source.stop(start + duration + 0.04);
}

function updateProximitySound(delta) {
  if (!music.enabled || !music.context) return;
  music.proximityTimer = Math.max(0, music.proximityTimer - delta);
  if (music.proximityTimer > 0) return;
  const target = nearestAudibleObject();
  if (!target) return;
  const distance = target.position.distanceTo(player.group.position);
  if (distance > target.range) return;
  const intensity = THREE.MathUtils.clamp(1 - distance / target.range, 0.18, 1);
  playSfx("near", intensity * target.weight);
  music.proximityTimer = THREE.MathUtils.lerp(2.8, 0.75, intensity);
}

function nearestAudibleObject() {
  let nearest = null;
  const consider = (position, range, weight = 1) => {
    const distance = position.distanceToSquared(player.group.position);
    if (!nearest || distance < nearest.distance) nearest = { position, range, weight, distance };
  };
  spores.forEach((spore) => {
    if (!spore.collected) consider(spore.group.position, 26, 0.72);
  });
  memoryShards.items.forEach((shard) => {
    if (!shard.collected) consider(shard.group.position, 32, 0.92);
  });
  boostRings.rings.forEach((ring) => {
    if (ring.userData.cooldown <= 0) consider(ring.position, 22, 0.68);
  });
  sanctuaries.items.forEach((sanctuary) => consider(sanctuary.group.position, 28, 0.58));
  if (player.gateOpened) consider(heartGate.group.position, 42, 0.85);
  return nearest;
}

function spawnEchoWave(range, layer = 0) {
  const wave = echoWaves.waves[echoWaves.index];
  echoWaves.index = (echoWaves.index + 1) % echoWaves.waves.length;
  wave.visible = true;
  wave.position.copy(player.group.position);
  wave.userData.maxLife = 1.02 + layer * 0.18;
  wave.userData.life = Math.max(0.22, wave.userData.maxLife - layer * 0.09);
  wave.userData.range = range * (1 + layer * 0.13);
  wave.userData.opacity = 1 - layer * 0.16;
  wave.scale.setScalar(1 + layer * 0.7);
  wave.material.color.setHex(layer === 0 ? 0x9ffbff : layer === 1 ? 0x76ffd2 : 0xb99cff);
  wave.material.opacity = 0.56 - layer * 0.08;
}

function triggerPulse() {
  if (player.introOpen || player.cooldown > 0 || player.energy < 8) return;
  playSfx("pulse", 1);
  const dir = player.intent.lengthSq() > 0.04 ? player.intent : getForward();
  player.velocity.addScaledVector(dir, 14.5);
  player.energy = Math.max(0, player.energy - 8);
  player.pulse = 1;
  player.magnet = 1.25;
  player.invulnerable = Math.max(player.invulnerable, 0.18);
  player.cooldown = 0.72;
  addTrailBurst(8, 1.1);
  burstImpact(player.group.position, { count: 28, scale: 1.15, energy: 1.3, spread: 0.95, color: 0xb99cff, direction: dir });
  spawnSpeedLines(11, 1.25, 0xb99cff);
  kickCamera(0.42);
}

function triggerSonar() {
  if (player.introOpen || player.upgradeOpen || player.sonarCooldown > 0 || player.energy < 10) return;
  playSfx("sonar", 1);
  const range = player.upgrades.echoRange;
  player.energy = Math.max(0, player.energy - 10);
  player.sonarCooldown = player.upgrades.echoCooldown;
  player.sonarWave = 1.15;
  player.magnet = Math.max(player.magnet, 1.05 + player.upgrades.magnetBonus);
  player.pulse = Math.max(player.pulse, 0.58);

  for (let layer = 0; layer < 3; layer += 1) spawnEchoWave(range, layer);

  let stunned = 0;
  predators.predators.forEach((hunter) => {
    const distance = hunter.position.distanceTo(player.group.position);
    if (distance < range) {
      hunter.userData.stun = Math.max(hunter.userData.stun, 1.2 + (range - distance) * 0.012);
      hunter.userData.biteCooldown = Math.max(hunter.userData.biteCooldown, 0.8);
      stunned += 1;
    }
  });

  memoryShards.items.forEach((shard) => {
    const distance = shard.group.position.distanceTo(player.group.position);
    if (!shard.collected && distance < range * 1.15) {
      shard.halo.material.opacity = 0.82;
      shard.ring.material.opacity = 0.64;
    }
  });

  if (stunned > 0) awardScore(80 * stunned, "声呐震荡");
  if (stunned > 0) reportMission("sonar", stunned);
  comboText.textContent = stunned > 0 ? `声呐震退 ${stunned}` : "声呐回声展开";
  addTrailBurst(7, 1.08);
  burstImpact(player.group.position, { count: 24, scale: 1.0, energy: 1.05, spread: 1.25, color: 0x9ffbff });
  spawnSpeedLines(7, 0.82, 0x76ffd2);
  kickCamera(0.28);
  flashScreen();
}

function getForward() {
  return forward.set(-Math.sin(input.yaw), 0, -Math.cos(input.yaw)).normalize();
}

function loop() {
  const now = performance.now() / 1000;
  const delta = Math.min(now - lastTime, 0.033);
  lastTime = now;
  elapsed += delta;
  update(delta, elapsed);
  composer.render();
  requestAnimationFrame(loop);
}

function update(delta, time) {
  updateMovement(delta);
  updatePlayerJelly(time, delta);
  updatePlankton(delta, time);
  updateFishSchools(time, delta);
  updateGlowStreams(time, delta);
  updateStorm(time, delta);
  updateHeartGate(time, delta);
  updateReefGlow(time, delta);
  updateAmbientJellies(time, delta);
  updateBoostRings(time, delta);
  updatePredators(time, delta);
  updateLeviathan(time, delta);
  updateBubbleField(delta, time);
  updateSpores(time, delta);
  updateMemoryShards(time, delta);
  updateVents(time, delta);
  updateSanctuaries(time, delta);
  updatePlayerTrail(delta, time);
  updateImpactBursts(delta, time);
  updateSpeedLines(delta, time);
  updateEchoWaves(delta);
  updateCompanions(time, delta);
  updateGuideLine(time);
  updateInteractionFocus(time, delta);
  updateCamera(delta);
  updateHud();
  updateMission(delta);
  updateMusic(delta, time);
  animateMaterials(time);
}

function updateMovement(delta) {
  const fwd = getForward();
  right.set(Math.cos(input.yaw), 0, -Math.sin(input.yaw)).normalize();
  player.intent.set(0, 0, 0);

  if (!player.upgradeOpen && !player.introOpen) {
    if (input.keys.has("KeyW") || input.keys.has("ArrowUp")) player.intent.add(fwd);
    if (input.keys.has("KeyS") || input.keys.has("ArrowDown")) player.intent.addScaledVector(fwd, -1);
    if (input.keys.has("KeyA") || input.keys.has("ArrowLeft")) player.intent.addScaledVector(right, -1);
    if (input.keys.has("KeyD") || input.keys.has("ArrowRight")) player.intent.add(right);
    if (input.keys.has("KeyE")) player.intent.add(up);
    if (input.keys.has("KeyQ")) player.intent.addScaledVector(up, -1);
    if (input.touchMove.lengthSq() > 0.01) {
      player.intent.addScaledVector(fwd, input.touchMove.y);
      player.intent.addScaledVector(right, input.touchMove.x);
    }
    if (input.touchVertical) player.intent.addScaledVector(up, input.touchVertical);
  }
  if (player.intent.lengthSq() > 1) player.intent.normalize();

  const energyFactor = THREE.MathUtils.mapLinear(player.energy, 0, player.maxEnergy, 0.38, 1);
  const boosting = (input.keys.has("ShiftLeft") || input.keys.has("ShiftRight")) && player.energy > 5 && player.intent.lengthSq() > 0.04;
  player.boostHeat = THREE.MathUtils.lerp(player.boostHeat, boosting ? 1 : 0, 1 - Math.pow(0.001, delta));
  const acceleration = 18.5 + player.boostHeat * 11.5;
  player.velocity.addScaledVector(player.intent, acceleration * energyFactor * delta);
  if (boosting) {
    player.velocity.addScaledVector(player.intent, 10.5 * delta);
    player.energy = Math.max(0, player.energy - delta * (8.4 + player.combo * 0.45) / player.upgrades.boostEfficiency);
    player.pulse = Math.max(player.pulse, 0.18 + player.boostHeat * 0.12);
    player.speedLineTimer -= delta;
    if (player.speedLineTimer <= 0) {
      spawnSpeedLines(2 + Math.floor(player.boostHeat * 2), 0.86 + player.boostHeat * 0.5, 0x9ffbff);
      player.speedLineTimer = 0.085;
    }
  } else {
    player.speedLineTimer = 0;
  }
  if (storm.intensity > 0.03) {
    player.velocity.addScaledVector(storm.drift, delta * storm.intensity * (1.35 - player.upgrades.stormResist * 0.7));
  }
  player.velocity.multiplyScalar(Math.pow(0.09, delta));
  player.velocity.clampLength(0, 14 * energyFactor + player.pulse * 7.5 + player.boostHeat * 7);
  player.group.position.addScaledVector(player.velocity, delta);
  player.group.position.x = THREE.MathUtils.clamp(player.group.position.x, -world.half, world.half);
  player.group.position.z = THREE.MathUtils.clamp(player.group.position.z, -world.half, world.half);
  player.group.position.y = THREE.MathUtils.clamp(player.group.position.y, world.floor + 8, world.ceiling);
  const stormRecovery = 1 - storm.intensity * (0.48 - player.upgrades.stormResist * 0.34);
  player.energy = Math.min(player.maxEnergy, player.energy + delta * 3.5 * THREE.MathUtils.clamp(stormRecovery, 0.42, 1.15));
  player.cooldown = Math.max(0, player.cooldown - delta);
  player.sonarCooldown = Math.max(0, player.sonarCooldown - delta);
  player.comboTimer = Math.max(0, player.comboTimer - delta);
  if (player.comboTimer === 0 && player.combo > 1) player.combo = 1;
  player.magnet = Math.max(0, player.magnet - delta * 1.35);
  player.invulnerable = Math.max(0, player.invulnerable - delta);
  player.pulse = Math.max(0, player.pulse - delta * 1.65);
  player.sonarWave = Math.max(0, player.sonarWave - delta * 1.15);
  player.hazard = Math.max(0, player.hazard - delta * 2.3);
}

function updatePlayerJelly(time, delta) {
  playerJelly.uniforms.time.value = time;
  playerJelly.uniforms.pulse.value = player.pulse;
  playerJelly.uniforms.stress.value = player.hazard;
  const speed = player.velocity.length();
  const stroke = (Math.sin(time * (3.1 + speed * 0.03)) + 1) * 0.5;
  const beat = Math.pow(stroke, 2.15);
  const squash = 1 + beat * 0.095 + player.pulse * 0.13;
  const stretch = 1 - beat * 0.095 - player.pulse * 0.055;
  playerJelly.bell.scale.set(1.14 * squash, 0.72 * stretch, 1.14 * squash);
  playerJelly.rim.scale.setScalar(1 + beat * 0.09 + player.pulse * 0.18);
  playerJelly.rim.position.y = -0.35 - beat * 0.07 + player.pulse * 0.03;
  playerJelly.skirt.rotation.y += delta * (0.16 + speed * 0.012);
  playerJelly.skirtLobes.forEach((lobe) => {
    const wave = Math.sin(time * 4.2 + lobe.userData.phase) * 0.5 + 0.5;
    const radius = 1.92 + beat * 0.22 + wave * 0.08 + player.pulse * 0.18;
    lobe.position.set(Math.cos(lobe.userData.angle) * radius, -0.43 - beat * 0.09, Math.sin(lobe.userData.angle) * radius);
    lobe.scale.set(1.05 + beat * 0.28, 0.22 + wave * 0.08, 0.46 + beat * 0.14);
    lobe.material.opacity = 0.18 + wave * 0.12 + player.pulse * 0.07;
  });
  playerJelly.inner.scale.set(0.74 + beat * 0.05 + player.pulse * 0.06, 1.35 - beat * 0.1 - player.pulse * 0.07, 0.74 + beat * 0.05 + player.pulse * 0.06);
  playerJelly.inner.position.y = 0.15 - beat * 0.18;
  playerJelly.halo.scale.set(8.8 + beat * 1.1 + player.pulse * 1.8 + player.boostHeat * 1.2, 8.0 + beat * 0.8 + player.pulse * 1.2 + player.boostHeat * 0.9, 1);
  playerJelly.halo.material.opacity = 0.24 + beat * 0.05 + player.pulse * 0.13 + player.boostHeat * 0.08 + Math.sin(time * 2) * 0.025;
  playerJelly.veinLines.forEach((line) => {
    line.material.opacity = 0.16 + beat * 0.12 + Math.sin(time * 2.6 + line.userData.phase) * 0.035;
    line.scale.setScalar(1 + beat * 0.05);
  });
  playerJelly.arms.rotation.y += delta * (0.28 + speed * 0.035);
  playerJelly.arms.children.forEach((arm, index) => {
    const wave = Math.sin(time * 3.8 + arm.userData.phase) * 0.5 + 0.5;
    arm.rotation.x = Math.cos(arm.userData.angle) * (0.18 + beat * 0.18) + wave * 0.08;
    arm.rotation.z = Math.sin(arm.userData.angle) * (0.18 + beat * 0.18);
    arm.scale.set(1 + beat * 0.12, 1 - beat * 0.18 + player.pulse * 0.08, 1 + wave * 0.08);
    arm.material.opacity = 0.25 + wave * 0.16 + player.pulse * 0.08;
  });
  playerJelly.ribbonArms.forEach((ribbon) => updateRibbonArm(ribbon, time, beat));
  playerJelly.pulseRings.forEach((ring) => {
    const ringPhase = (time * 0.55 + ring.userData.offset + player.pulse * 0.24) % 1;
    const active = player.pulse > 0.03 || beat > 0.7;
    ring.scale.setScalar(1 + ringPhase * 1.45 + player.pulse * 0.25);
    ring.position.y = -0.34 - ringPhase * 0.65;
    ring.material.opacity = active ? (1 - ringPhase) * (0.16 + player.pulse * 0.28) : 0;
  });
  playerJelly.tentacles.forEach((tentacle, index) => {
    if (index % 2 === 0 || player.velocity.lengthSq() > 0.02) updateTentacle(tentacle, time);
  });
  player.playerLight.intensity = 4.8 + beat * 0.9 + player.pulse * 7.2 + player.boostHeat * 2.2;
  player.pulseLight.intensity = player.pulse * 8.5 + player.boostHeat * 1.8;

  if (player.velocity.lengthSq() > 0.035) {
    tmp.copy(player.group.position).add(player.velocity);
    player.group.lookAt(tmp.x, player.group.position.y + player.velocity.y * 0.25, tmp.z);
    player.group.rotateX(THREE.MathUtils.clamp(-player.velocity.y * 0.03, -0.32, 0.32));
    player.group.rotateZ(THREE.MathUtils.clamp(player.velocity.x * -0.01, -0.22, 0.22));
  }
}

function updateRibbonArm(ribbon, time, beat) {
  const attr = ribbon.line.geometry.attributes.position;
  const baseX = Math.cos(ribbon.angle) * 0.46;
  const baseZ = Math.sin(ribbon.angle) * 0.46;
  const velocityDrift = tmp.copy(player.velocity).multiplyScalar(0.08);
  for (let i = 0; i < ribbon.points; i += 1) {
    const p = i / (ribbon.points - 1);
    const wave = Math.sin(time * 2.35 + ribbon.phase + p * 7.2) * p;
    const flutter = Math.cos(time * 3.2 + ribbon.phase + p * 5.4) * p * p;
    attr.setXYZ(
      i,
      baseX + Math.cos(ribbon.angle + Math.PI / 2) * wave * 0.36 - velocityDrift.x * p * 0.22,
      -0.78 - ribbon.length * p + beat * (0.28 - p * 0.22),
      baseZ + Math.sin(ribbon.angle + Math.PI / 2) * flutter * 0.42 - velocityDrift.z * p * 0.22
    );
  }
  attr.needsUpdate = true;
  ribbon.line.material.opacity = 0.3 + beat * 0.2 + Math.sin(time * 2.2 + ribbon.phase) * 0.08;
}

function updatePlankton(delta, time) {
  const p = plankton.positions;
  const center = player.group.position;
  for (let i = 0; i < plankton.count; i += 1) {
    const k = i * 3;
    p[k + 1] += Math.sin(time * 0.45 + i) * 0.003 + delta * 0.08;
    p[k] += Math.sin(time * 0.1 + i * 0.07) * delta * 0.08;
    if (p[k] - center.x > 205) p[k] -= 410;
    if (p[k] - center.x < -205) p[k] += 410;
    if (p[k + 1] - center.y > 88) p[k + 1] -= 165;
    if (p[k + 1] - center.y < -88) p[k + 1] += 165;
    if (p[k + 2] - center.z > 205) p[k + 2] -= 410;
    if (p[k + 2] - center.z < -205) p[k + 2] += 410;
  }
  plankton.points.geometry.attributes.position.needsUpdate = true;
}

function updateFishSchools(time, delta) {
  fishSchools.schools.forEach((school, schoolIndex) => {
    const seed = school.userData.seed;
    school.position.x += Math.sin(time * school.userData.speed + seed) * delta * 4;
    school.position.z += delta * (4 + schoolIndex * 0.7);
    if (school.position.z > 150) school.position.z = -165;
    school.userData.fish.forEach((fish, i) => {
      const offset = fish.userData.offset;
      fish.position.set(
        offset.x + Math.sin(time * 2 + i) * 0.8,
        offset.y + Math.cos(time * 1.4 + i * 0.7) * 0.45,
        offset.z + Math.sin(time * 1.3 + i) * 0.8
      );
      fish.rotation.y = Math.sin(time * 0.7 + seed) * 0.28;
      fish.material.opacity = 0.36 + Math.sin(time * 3 + i) * 0.16;
    });
  });
}

function updateGlowStreams(time, delta) {
  glowStreams.streams.forEach((stream, streamIndex) => {
    stream.line.material.opacity = 0.1 + Math.sin(time * 0.8 + stream.seed) * 0.04;
    stream.motes.children.forEach((mote, i) => {
      mote.userData.t = (mote.userData.t + delta * mote.userData.speed) % 1;
      const point = stream.curve.getPointAt(mote.userData.t);
      mote.position.copy(point);
      const pulse = 0.6 + Math.sin(time * 3.2 + i + streamIndex) * 0.28;
      mote.material.opacity = 0.2 + pulse * 0.28;
      mote.scale.setScalar((0.75 + (i % 5) * 0.12) * (0.8 + pulse * 0.4));
    });
  });
}

function updateStorm(time, delta) {
  storm.timer -= delta;
  if (storm.target <= 0 && storm.timer <= 0) {
    storm.target = 1;
    storm.duration = THREE.MathUtils.randFloat(10, 16) + player.stage * 0.8;
    storm.seed = Math.random() * 100;
    showMessage("深海风暴正在穿过裂谷。声呐可以稳住航线。", 1800);
  }
  if (storm.target > 0) {
    storm.duration -= delta;
    if (storm.duration <= 0) {
      storm.target = 0;
      storm.timer = THREE.MathUtils.randFloat(22, 34);
      showMessage("洋流重新变得清澈。", 1200);
    }
  }

  storm.intensity = THREE.MathUtils.lerp(storm.intensity, storm.target, 1 - Math.pow(0.02, delta));
  storm.drift.set(
    Math.sin(time * 0.42 + storm.seed) * 1.8,
    Math.sin(time * 0.26 + storm.seed * 0.3) * 0.28,
    Math.cos(time * 0.38 + storm.seed) * 1.8
  ).normalize();

  scene.fog.density = 0.011 + storm.intensity * 0.006;
  bloom.strength = 0.82 + storm.intensity * 0.16 + player.sonarWave * 0.12;
  stormOverlay.style.opacity = `${storm.intensity * 0.46}`;

  stormVeils.veils.forEach((veil, index) => {
    veil.position.addScaledVector(storm.drift, delta * veil.userData.speed * (0.2 + storm.intensity));
    veil.position.y += Math.sin(time * 0.7 + veil.userData.phase) * delta * storm.intensity * 2.4;
    veil.material.opacity = storm.intensity * (veil.userData.stormOpacity + Math.sin(time * 1.5 + index) * 0.018);
    if (veil.position.x - player.group.position.x > 190) veil.position.x -= 380;
    if (veil.position.x - player.group.position.x < -190) veil.position.x += 380;
    if (veil.position.z - player.group.position.z > 190) veil.position.z -= 380;
    if (veil.position.z - player.group.position.z < -190) veil.position.z += 380;
  });
}

function updateHeartGate(time, delta) {
  const open = player.gateOpened ? 1 : 0;
  heartGate.group.rotation.y += delta * (0.06 + open * 0.18);
  heartGate.group.position.y = world.floor + 18 + Math.sin(time * 0.62) * 0.7;
  heartGate.rings.forEach((ring, index) => {
    ring.rotation.z += delta * ring.userData.speed * (index % 2 === 0 ? 1 : -1) * (1 + open * 2.2);
    ring.rotation.y += delta * 0.04 * (index + 1);
    ring.material.opacity = ring.userData.base + open * (0.16 + index * 0.045) + Math.sin(time * 1.5 + index) * 0.018;
    ring.scale.setScalar(1 + open * 0.18 + Math.sin(time * 1.2 + index) * 0.025);
  });
  heartGate.crystals.forEach((crystal, index) => {
    const pulse = 0.5 + Math.sin(time * 2.4 + crystal.userData.phase) * 0.5;
    crystal.rotation.y += delta * (0.45 + open * 0.65);
    crystal.material.opacity = 0.2 + pulse * 0.22 + open * 0.24;
    crystal.scale.setScalar(0.85 + pulse * 0.18 + open * 0.22);
    if (index % 2 === 0) crystal.position.y += Math.sin(time * 1.8 + index) * delta * 0.06;
  });
  heartGate.core.material.opacity = 0.12 + open * 0.42 + Math.sin(time * 2.1) * 0.035;
  heartGate.core.scale.setScalar(10.5 + open * 4.8 + Math.sin(time * 1.4) * 0.8);
  heartGate.light.intensity = 0.75 + open * 4.6 + Math.sin(time * 1.7) * 0.35;

  if (!player.gateOpened) return;
  const distance = heartGate.group.position.distanceTo(player.group.position);
  if (distance < 34 && distance > 1) {
    tmp.copy(heartGate.group.position).sub(player.group.position).normalize();
    player.velocity.addScaledVector(tmp, delta * (4.8 + (34 - distance) * 0.13));
  }
  if (distance < 8.5) completeStage();
}

function updateBoostRings(time, delta) {
  boostRings.rings.forEach((ring, index) => {
    ring.userData.cooldown = Math.max(0, ring.userData.cooldown - delta);
    const ready = ring.userData.cooldown <= 0;
    const wave = 0.5 + Math.sin(time * 2.2 + ring.userData.phase) * 0.5;
    ring.rotation.x += delta * (0.18 + index * 0.006);
    ring.rotation.y += delta * (0.28 + wave * 0.12);
    ring.scale.setScalar(ring.userData.baseScale * (ready ? 1 + wave * 0.08 : 0.62));
    ring.material.opacity = ready ? 0.24 + wave * 0.38 : 0.06;
    const core = ring.children[0];
    core.material.opacity = ready ? 0.12 + wave * 0.28 : 0.04;

    if (!ready) return;
    const distance = ring.position.distanceTo(player.group.position);
    if (distance < 4.9) {
      const dir = player.intent.lengthSq() > 0.04 ? player.intent : getForward();
      player.velocity.addScaledVector(dir, 22 + player.combo * 0.8);
      player.energy = Math.min(player.maxEnergy, player.energy + 12);
      player.pulse = Math.max(player.pulse, 0.72);
      player.magnet = Math.max(player.magnet, 1.1);
      ring.userData.cooldown = 6.5;
      raiseCombo(1);
      awardScore(90, "疾流穿环");
      reportMission("ring", 1);
      playSfx("collect", 0.85);
      addTrailBurst(10, 1.25);
      burstImpact(ring.position, { count: 24, scale: 1.25, energy: 1.25, spread: 1.45, color: 0xffd182, direction: dir });
      spawnSpeedLines(16, 1.45, 0xffd182);
      kickCamera(0.34);
      flashScreen();
    }
  });
}

function updatePredators(time, delta) {
  predators.predators.forEach((hunter, index) => {
    const data = hunter.userData;
    data.stun = Math.max(0, data.stun - delta);
    data.biteCooldown = Math.max(0, data.biteCooldown - delta);
    const stageSpeed = 1 + (player.stage || 1) * 0.05;
    if (data.stun <= 0) {
      const t = time * data.speed * stageSpeed + data.seed;
      const target = new THREE.Vector3(
        data.home.x + Math.sin(t * 1.3) * data.radius,
        data.home.y + Math.sin(t * 0.8 + index) * 9,
        data.home.z + Math.cos(t) * data.radius
      );
      hunter.position.lerp(target, 1 - Math.pow(0.01, delta));
      const next = target.clone().add(new THREE.Vector3(Math.cos(t), Math.sin(t * 0.7) * 0.2, -Math.sin(t)));
      hunter.lookAt(next);
    } else {
      hunter.rotation.z += delta * 1.8;
      hunter.position.y += Math.sin(time * 7 + index) * delta * 0.6;
    }

    const dangerDistance = hunter.position.distanceTo(player.group.position);
    const pulseHits = player.pulse > 0.48 && dangerDistance < 18;
    if (pulseHits && data.stun <= 0.05) {
      data.stun = 3.2;
      data.biteCooldown = 1.2;
      player.energy = Math.min(player.maxEnergy, player.energy + 10);
      raiseCombo(1);
      awardScore(150, "脉冲震退");
      playSfx("pulse", 0.75);
      burstImpact(hunter.position, { count: 22, scale: 1.1, energy: 1.15, spread: 1.1, color: 0xff6f8f });
      kickCamera(0.28);
      flashScreen();
    }

    const lurePulse = 0.5 + Math.sin(time * 5.4 + data.seed) * 0.5;
    data.lure.material.opacity = data.stun > 0 ? 0.16 + lurePulse * 0.12 : 0.5 + lurePulse * 0.34;
    data.lure.scale.setScalar(data.stun > 0 ? 1.3 : 2.0 + lurePulse * 0.55);
    hunter.children.forEach((part) => {
      if (!part.material || !part.material.emissive) return;
      part.material.emissiveIntensity = data.stun > 0 ? 0.2 : 0.55 + player.stage * 0.06;
    });

    if (dangerDistance < 7.2 && data.biteCooldown <= 0 && player.invulnerable <= 0) {
      if (player.companions > 0) {
        player.companions -= 1;
        data.stun = 2.4;
        data.biteCooldown = 1.8;
        player.invulnerable = 0.6;
        player.hazard = Math.max(player.hazard, 0.55);
        tmp.copy(player.group.position).sub(hunter.position).normalize();
        player.velocity.addScaledVector(tmp, 9);
        burstImpact(player.group.position, { count: 18, scale: 1.0, energy: 0.9, spread: 1.0, color: 0x76ffd2, direction: tmp });
        kickCamera(0.3);
        awardScore(70, "伙伴护航");
        showMessage("共生小水母挡下了掠食者。", 1200);
        flashScreen();
        return;
      }
      const force = 1 - dangerDistance / 7.2;
      player.energy = Math.max(0, player.energy - (18 + player.stage * 2) * force);
      player.hazard = Math.max(player.hazard, 0.8);
      player.invulnerable = 0.75;
      data.biteCooldown = 1.7;
      tmp.copy(player.group.position).sub(hunter.position).normalize();
      player.velocity.addScaledVector(tmp, 12 + player.stage);
      burstImpact(player.group.position, { count: 28, scale: 1.2, energy: 1.35, spread: 1.15, color: 0xff5f70, direction: tmp });
      kickCamera(0.72);
      resetCombo("掠食者擦伤");
      showMessage("掠食者擦过了触须，连击中断。", 1200);
      flashScreen("hit");
    }
  });
}

function updateLeviathan(time, delta) {
  if (!leviathanState.active) {
    leviathanState.timer -= delta;
    leviathan.group.visible = false;
    if (leviathanState.timer <= 0) startLeviathanEvent();
    return;
  }

  leviathanState.duration -= delta;
  leviathanState.stun = Math.max(0, leviathanState.stun - delta);
  leviathanState.phase += delta * (0.34 + storm.intensity * 0.18);
  const radius = 46 + Math.sin(time * 0.22) * 8;
  const height = 5 + Math.sin(time * 0.31 + 2) * 5;
  const target = tmp.set(
    player.group.position.x + Math.cos(leviathanState.phase) * radius,
    THREE.MathUtils.clamp(player.group.position.y + height, world.floor + 16, world.ceiling - 6),
    player.group.position.z + Math.sin(leviathanState.phase) * radius
  );
  const lerpSpeed = leviathanState.stun > 0 ? 0.25 : 0.92;
  leviathan.group.position.lerp(target, 1 - Math.pow(0.015, delta * lerpSpeed));
  leviathan.group.lookAt(player.group.position);
  leviathan.group.rotateY(Math.PI / 2);
  leviathan.group.visible = true;

  leviathan.segments.forEach((segment, index) => {
    const wave = Math.sin(time * 1.6 + index * 0.62) * 0.9;
    segment.position.set(index * 3.0, wave * 0.28, Math.cos(time * 1.2 + index) * 0.34);
    segment.rotation.y = Math.sin(time * 1.1 + index * 0.45) * 0.12;
    segment.material.emissiveIntensity = 0.34 + storm.intensity * 0.2 + (leviathanState.stun > 0 ? 0.22 : 0);
  });
  leviathan.fins.forEach((fin) => {
    const segment = leviathan.segments[fin.userData.segment];
    fin.position.copy(segment.position).add(new THREE.Vector3(0.6, fin.userData.side * 1.08, 0));
    fin.rotation.z = fin.userData.side * (0.6 + Math.sin(time * 2.4 + fin.userData.phase) * 0.2);
    fin.material.opacity = 0.18 + storm.intensity * 0.12 + (leviathanState.stun > 0 ? 0.2 : 0);
  });
  leviathan.eyes.forEach((eye, index) => {
    eye.material.opacity = 0.58 + Math.sin(time * 5 + index) * 0.16;
    eye.scale.setScalar(2.0 + storm.intensity * 0.6 + Math.sin(time * 3 + index) * 0.18);
  });
  leviathan.weakNodes.forEach((node, index) => {
    const pulse = 0.5 + Math.sin(time * 3.2 + node.userData.phase) * 0.5;
    node.material.opacity = 0.32 + pulse * 0.32 + (leviathanState.stun > 0 ? 0.22 : 0);
    node.scale.setScalar(2.3 + pulse * 0.7);
  });
  leviathan.light.intensity = leviathanState.active ? 1.4 + storm.intensity * 1.2 + (leviathanState.stun > 0 ? 2.2 : 0) : 0;

  const distance = leviathan.group.position.distanceTo(player.group.position);
  if (distance < 38 && leviathanState.stun <= 0) {
    const dread = 1 - distance / 38;
    player.hazard = Math.max(player.hazard, dread * 0.86);
    player.energy = Math.max(0, player.energy - delta * (5 + player.stage * 0.8) * dread);
    tmp.copy(player.group.position).sub(leviathan.group.position).normalize();
    player.velocity.addScaledVector(tmp, delta * 5.4 * dread);
  }

  if (player.pulse > 0.62 && distance < 31) damageLeviathan(10 + player.combo * 1.8, "脉冲刺伤");
  if (player.sonarWave > 0.72 && distance < player.upgrades.echoRange + 12) damageLeviathan(16 + player.upgrades.echoRange * 0.07, "声呐裂隙");

  if (leviathanState.duration <= 0) endLeviathanEvent(false);
}

function startLeviathanEvent() {
  leviathanState.active = true;
  leviathanState.duration = 42 + player.stage * 2;
  leviathanState.maxHealth = 85 + player.stage * 18;
  leviathanState.health = leviathanState.maxHealth;
  leviathanState.stun = 0;
  leviathanState.phase = Math.random() * Math.PI * 2;
  const startAngle = leviathanState.phase + Math.PI;
  leviathan.group.position.set(
    player.group.position.x + Math.cos(startAngle) * 74,
    THREE.MathUtils.clamp(player.group.position.y + 12, world.floor + 18, world.ceiling - 6),
    player.group.position.z + Math.sin(startAngle) * 74
  );
  leviathan.group.visible = true;
  storm.target = Math.max(storm.target, 0.75);
  storm.duration = Math.max(storm.duration, 14);
  playSfx("warning", 1);
  burstImpact(player.group.position, { count: 30, scale: 1.5, energy: 1.05, spread: 1.6, color: 0xff5f70 });
  kickCamera(0.78);
  showMessage("深渊幽影苏醒了。用声呐照出弱点，再用脉冲逼退它。", 3200);
  flashScreen("hit");
}

function damageLeviathan(amount, label) {
  if (!leviathanState.active || leviathanState.stun > 0.12) return;
  leviathanState.health = Math.max(0, leviathanState.health - amount);
  leviathanState.stun = 0.7;
  player.invulnerable = Math.max(player.invulnerable, 0.25);
  player.magnet = Math.max(player.magnet, 0.8);
  awardScore(120, label);
  reportMission("sonar", 1);
  playSfx("pulse", 0.9);
  addTrailBurst(7, 1.25);
  tmp2.copy(leviathan.group.position).lerp(player.group.position, 0.32);
  burstImpact(tmp2, { count: 34, scale: 1.7, energy: 1.35, spread: 1.4, color: 0xffd182 });
  kickCamera(0.46);
  flashScreen();
  if (leviathanState.health <= 0) endLeviathanEvent(true);
}

function endLeviathanEvent(defeated) {
  if (!leviathanState.active) return;
  leviathanState.active = false;
  leviathan.group.visible = false;
  bossStrip.classList.remove("show");
  leviathanState.timer = THREE.MathUtils.randFloat(52, 74);
  if (defeated) {
    awardScore(900, "幽影退潮");
    reportMission("leviathan", 1);
    playSfx("upgrade", 1);
    player.energy = Math.min(player.maxEnergy, player.energy + 26);
    if (player.companions < player.companionLimit) player.companions += 1;
    showMessage("幽影沉回海沟，裂谷短暂安静下来。", 2200);
  } else {
    showMessage("幽影远去，留下低沉回声。", 1300);
  }
}

function updateBubbleField(delta, time) {
  const p = bubbleField.positions;
  const center = player.group.position;
  for (let i = 0; i < bubbleField.count; i += 1) {
    const k = i * 3;
    p[k + 1] += delta * (0.9 + (i % 7) * 0.13);
    p[k] += Math.sin(time * 0.55 + i) * delta * 0.16;
    p[k + 2] += Math.cos(time * 0.45 + i * 0.2) * delta * 0.12;
    if (p[k + 1] - center.y > 92) p[k + 1] -= 176;
    if (p[k] - center.x > 190) p[k] -= 380;
    if (p[k] - center.x < -190) p[k] += 380;
    if (p[k + 2] - center.z > 190) p[k + 2] -= 380;
    if (p[k + 2] - center.z < -190) p[k + 2] += 380;
  }
  bubbleField.points.geometry.attributes.position.needsUpdate = true;
}

function updatePlayerTrail(delta, time) {
  const speed = player.velocity.length();
  playerTrail.accumulator += delta * (speed * 0.08 + player.pulse * 2 + player.boostHeat * 3.2);
  if (playerTrail.accumulator > 0.18) {
    playerTrail.accumulator = 0;
    addTrailBurst(1, 0.74 + player.boostHeat * 0.35);
  }

  playerTrail.sprites.forEach((sprite, index) => {
    if (sprite.userData.life <= 0) return;
    sprite.userData.life = Math.max(0, sprite.userData.life - delta);
    const p = sprite.userData.life / sprite.userData.maxLife;
    sprite.material.opacity = p * p * (index % 4 === 0 ? 0.22 : 0.42);
    const scale = sprite.userData.baseScale * (1 + (1 - p) * 1.8);
    sprite.scale.set(scale, scale, 1);
    sprite.rotation.z = sprite.userData.spin + time * 0.9;
  });
}

function updateEchoWaves(delta) {
  echoWaves.waves.forEach((wave) => {
    if (wave.userData.life <= 0) {
      wave.visible = false;
      return;
    }
    wave.userData.life = Math.max(0, wave.userData.life - delta);
    const p = 1 - wave.userData.life / wave.userData.maxLife;
    const radius = THREE.MathUtils.lerp(2, wave.userData.range, p);
    wave.position.y = player.group.position.y - 0.2 + Math.sin(p * Math.PI) * 0.18;
    wave.scale.set(radius, radius, radius);
    wave.rotation.z += delta * (0.28 + wave.userData.range * 0.002);
