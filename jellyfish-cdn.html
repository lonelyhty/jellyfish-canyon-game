    wave.material.opacity = (1 - p) * (0.5 + player.upgrades.magnetBonus * 0.25) * (wave.userData.opacity || 1);
  });
}

function updateCompanions(time, delta) {
  const speed = player.velocity.length();
  companions.group.rotation.y += delta * (0.18 + player.combo * 0.018 + speed * 0.006);
  companions.items.forEach((jelly, index) => {
    const active = index < player.companions;
    jelly.visible = active;
    if (!active) return;

    const data = jelly.userData;
    const angle = (index / Math.max(1, player.companions)) * Math.PI * 2 + time * (0.45 + index * 0.01);
    const lane = index % 2 === 0 ? 1 : -1;
    const radius = data.radius + Math.sin(time * 1.3 + data.phase) * 0.35 + player.boostHeat * 0.45;
    jelly.position.set(
      Math.cos(angle) * radius,
      -0.4 + lane * 0.52 + Math.sin(time * 1.7 + data.phase) * 0.6,
      Math.sin(angle) * radius
    );
    jelly.lookAt(0, 0.15, 0);

    const beat = 0.5 + Math.sin(time * 3.1 + data.phase) * 0.5;
    data.body.scale.set(1.18 + beat * 0.28, 0.54 + beat * 0.1, 1.18 + beat * 0.28);
    data.body.material.opacity = 0.22 + beat * 0.18 + player.combo * 0.012;
    data.halo.material.opacity = 0.12 + beat * 0.16 + player.magnet * 0.07;
    data.halo.scale.setScalar(1.85 + beat * 0.55 + player.combo * 0.04);

    data.threads.forEach((line, threadIndex) => {
      const attr = line.geometry.attributes.position;
      const baseAngle = line.userData.angle + time * 0.08;
      for (let pIndex = 0; pIndex < 7; pIndex += 1) {
        const p = pIndex / 6;
        const curl = Math.sin(time * 2.2 + line.userData.phase + p * 5) * p * p * 0.2;
        attr.setXYZ(
          pIndex,
          Math.cos(baseAngle) * (0.24 + p * 0.12) + curl,
          -0.1 - p * (1.2 + threadIndex * 0.16),
          Math.sin(baseAngle) * (0.24 + p * 0.12) - curl
        );
      }
      attr.needsUpdate = true;
      line.material.opacity = 0.2 + beat * 0.14;
    });
  });
}

function updateGuideLine(time) {
  const target = player.gateOpened ? heartGate : nearestSpore();
  guideLine.line.visible = !!target;
  if (!target) return;

  const attr = guideLine.line.geometry.attributes.position;
  const start = player.group.position;
  const end = target.group.position;
  const distance = start.distanceTo(end);
  for (let i = 0; i < guideLine.points; i += 1) {
    const p = i / (guideLine.points - 1);
    const sway = Math.sin(time * 1.8 + p * Math.PI * 5) * Math.sin(p * Math.PI) * 0.75;
    const lift = Math.sin(time * 1.2 + p * Math.PI * 2) * Math.sin(p * Math.PI) * 0.45;
    attr.setXYZ(
      i,
      THREE.MathUtils.lerp(start.x, end.x, p) + sway,
      THREE.MathUtils.lerp(start.y + 0.2, end.y, p) + lift,
      THREE.MathUtils.lerp(start.z, end.z, p) - sway * 0.35
    );
  }
  attr.needsUpdate = true;
  guideLine.line.material.opacity = THREE.MathUtils.clamp((player.gateOpened ? 0.24 : 0.11) + player.combo * 0.008 - distance * 0.00045, 0.045, 0.28);
}

function updateReefGlow(time, delta) {
  reefGlow.lights.forEach((sprite, index) => {
    const wave = Math.sin(time * 1.4 + sprite.userData.phase) * 0.5 + 0.5;
    sprite.position.y = sprite.userData.baseY + Math.sin(time * 0.55 + index) * 0.6;
    sprite.position.z += delta * sprite.userData.drift * 8;
    if (sprite.position.z > 145) sprite.position.z -= 300;
    const scale = sprite.userData.baseScale * (0.78 + wave * 0.46);
    sprite.scale.set(scale, scale, 1);
    sprite.material.opacity = 0.1 + wave * 0.28;
  });
}

function updateAmbientJellies(time, delta) {
  ambientJellies.jellies.forEach((jelly) => {
    jelly.position.addScaledVector(jelly.userData.drift, delta);
    jelly.position.y = jelly.userData.baseY + Math.sin(time * 0.7 + jelly.userData.seed) * 1.5;
    jelly.rotation.y += delta * 0.18;
  });
}

function updateSpores(time, delta) {
  spores.forEach((spore, index) => {
    if (spore.collected) return;
    const distance = spore.group.position.distanceTo(player.group.position);
    const sonarPull = player.sonarWave > 0 && distance < player.upgrades.echoRange;
    if ((player.magnet > 0 || player.gateOpened || sonarPull) && distance < 34 && distance > 1) {
      const pull = player.gateOpened ? 0.03 : 0.06 + player.magnet * 0.06 + (sonarPull ? 0.035 : 0);
      spore.group.position.lerp(player.group.position, 1 - Math.pow(1 - pull, delta * 60));
      spore.baseY = spore.group.position.y;
    }
    spore.group.position.y = spore.baseY + Math.sin(time * 1.8 + spore.seed) * 0.42;
    spore.group.rotation.y += 0.014;
    spore.ring.rotation.z += 0.018;
    spore.halo.material.opacity = 0.42 + Math.sin(time * 2.4 + index) * 0.14 + player.magnet * 0.1 + (sonarPull ? 0.22 : 0);
    spore.ring.scale.setScalar(1 + Math.sin(time * 2.8 + index) * 0.05 + player.magnet * 0.12 + (sonarPull ? 0.22 : 0));
    if (distance < player.upgrades.collectionReach) {
      collectSpore(spore);
    }
  });
}

function updateMemoryShards(time, delta) {
  memoryShards.items.forEach((shard, index) => {
    if (shard.collected) return;
    const distance = shard.group.position.distanceTo(player.group.position);
    const sonarPull = player.sonarWave > 0 && distance < player.upgrades.echoRange * 1.2;
    if ((sonarPull || player.magnet > 0.8) && distance < 28 && distance > 1) {
      shard.group.position.lerp(player.group.position, 1 - Math.pow(0.94 - player.upgrades.magnetBonus * 0.05, delta * 60));
      shard.baseY = shard.group.position.y;
    }
    shard.group.position.y = shard.baseY + Math.sin(time * 1.6 + shard.seed) * 0.48;
    shard.core.rotation.x += delta * (0.8 + index * 0.04);
    shard.core.rotation.y += delta * 1.2;
    shard.ring.rotation.z -= delta * 1.1;
    shard.halo.material.opacity = 0.28 + Math.sin(time * 2.2 + index) * 0.12 + (sonarPull ? 0.35 : 0);
    shard.ring.material.opacity = 0.22 + (sonarPull ? 0.34 : 0);
    shard.group.scale.setScalar(1 + Math.sin(time * 2.4 + shard.seed) * 0.06 + (sonarPull ? 0.14 : 0));
    if (distance < 2.45 + player.upgrades.collectionReach * 0.12) {
      collectMemoryShard(shard);
    }
  });
}

function collectMemoryShard(shard) {
  shard.collected = true;
  shard.group.visible = false;
  player.memories += 1;
  raiseCombo(1);
  awardScore(220, "记忆碎片");
  reportMission("memory", 1);
  playSfx("memory", 1);
  burstImpact(shard.group.position, { count: 22, scale: 1.25, energy: 0.92, spread: 0.9, color: 0xffd182 });
  kickCamera(0.18);
  player.energy = Math.min(player.maxEnergy, player.energy + 9);
  player.magnet = Math.max(player.magnet, 0.9 + player.upgrades.magnetBonus);
  addTrailBurst(9, 1.25);
  flashScreen();
  if (player.memories >= 3) {
    player.memories = 0;
    setTimeout(() => offerUpgradeChoices(), 420);
  } else {
    showMessage(`记忆碎片 ${player.memories}/3`, 900);
  }
  setTimeout(() => placeMemoryShard(shard, Math.floor(Math.random() * 6)), 9000 + Math.random() * 5000);
}

function collectSpore(spore) {
  spore.collected = true;
  spore.group.visible = false;
  player.spores += 1;
  raiseCombo(1);
  awardScore(120, player.combo > 3 ? "连锁吸收" : "荧光孢子");
  reportMission("spore", 1);
  playSfx("collect", 0.92);
  burstImpact(spore.group.position, { count: 14, scale: 0.85, energy: 0.72, spread: 0.72, color: 0x76ffd2 });
  kickCamera(0.12);
  player.energy = Math.min(player.maxEnergy, player.energy + 13 + player.combo * 1.8);
  player.pulse = Math.max(player.pulse, 0.72);
  player.magnet = Math.max(player.magnet, 0.72 + player.upgrades.magnetBonus);
  if (player.companions < player.companionLimit && (player.combo >= 3 || player.spores % 3 === 0)) {
    player.companions += 1;
    comboText.textContent = `共生伙伴 +1`;
  }
  addTrailBurst(5, 0.9);
  flashScreen();

  if (player.spores >= world.objective && !player.gateOpened) {
    openHeartGate();
  } else if (!player.gateOpened) {
    const remaining = Math.max(0, world.objective - player.spores);
    showMessage(remaining <= 3 ? `海心回声增强，还差 ${remaining} 个。` : "荧光孢子吸收。", 1050);
  }

  const delay = player.gateOpened ? 7600 : 4400 + Math.random() * 2600;
  setTimeout(() => {
    if (!player.gateComplete) placeSpore(spore);
  }, delay);
}

function raiseCombo(amount) {
  player.combo = Math.min(tuning.maxCombo, (player.comboTimer > 0 ? player.combo : 1) + amount);
  player.comboTimer = tuning.comboWindow;
}

function resetCombo(reason) {
  if (player.combo <= 1) return;
  player.combo = 1;
  player.comboTimer = 0;
  comboText.textContent = reason || "连击中断";
}

function awardScore(base, label) {
  const gained = Math.round(base * player.combo * (1 + (player.stage - 1) * 0.12));
  player.score += gained;
  scoreValue.textContent = player.score.toLocaleString("zh-CN");
  comboText.textContent = `${label} +${gained}`;
}

function startMission(forcedType) {
  const pool = forcedType ? missionCatalog.filter((item) => item.type === forcedType) : missionCatalog;
  const next = pool[Math.floor(Math.random() * pool.length)] || missionCatalog[0];
  mission.index += 1;
  mission.title = next.title;
  mission.type = next.type;
  mission.progress = 0;
  mission.target = next.target;
  mission.timer = next.time;
  mission.reward = next.reward;
  updateMissionHud();
}

function reportMission(type, amount = 1) {
  if (mission.type !== type || mission.progress >= mission.target) return;
  mission.progress = Math.min(mission.target, mission.progress + amount);
  if (mission.progress >= mission.target) completeMission();
  else updateMissionHud();
}

function completeMission() {
  const gained = Math.round(mission.reward * (1 + (player.stage - 1) * 0.1));
  player.score += gained;
  player.energy = Math.min(player.maxEnergy, player.energy + 16);
  player.memories = Math.min(2, player.memories + 1);
  comboText.textContent = `委托完成 +${gained}`;
  scoreValue.textContent = player.score.toLocaleString("zh-CN");
  playSfx("upgrade", 0.84);
  showMessage(`裂谷委托完成：${mission.title}`, 1300);
  addTrailBurst(12, 1.35);
  flashScreen();
  setTimeout(() => startMission(), 900);
}

function updateMission(delta) {
  mission.timer = Math.max(0, mission.timer - delta);
  if (mission.timer <= 0 && mission.progress < mission.target) {
    comboText.textContent = "委托更替";
    startMission();
  } else {
    updateMissionHud();
  }
}

function updateMissionHud() {
  missionLabel.childNodes[0].nodeValue = `${mission.title} · `;
  missionProgress.textContent = `${mission.progress}/${mission.target}`;
  const progress = mission.target > 0 ? mission.progress / mission.target : 0;
  const timePressure = mission.timer > 0 ? THREE.MathUtils.clamp(mission.timer / 70, 0.22, 1) : 0;
  missionFill.style.transform = `scaleX(${THREE.MathUtils.clamp(progress || timePressure * 0.18, 0.04, 1)})`;
  missionFill.style.opacity = `${0.62 + progress * 0.38}`;
}

function openHeartGate() {
  player.gateOpened = true;
  player.gateComplete = false;
  player.magnet = Math.max(player.magnet, 1.4);
  player.pulse = Math.max(player.pulse, 1);
  awardScore(600, "海心苏醒");
  playSfx("upgrade", 1);
  addTrailBurst(18, 1.65);
  showMessage("海沟之心已苏醒，跟随雷达返回遗迹门。", 2600);
  flashScreen();
}

function completeStage() {
  if (player.gateComplete) return;
  player.gateComplete = true;
  player.gateOpened = false;
  raiseCombo(2);
  awardScore(900, `第 ${player.stage} 潜层完成`);
  player.stage += 1;
  world.objective = Math.min(28, world.objective + 4);
  player.spores = 0;
  player.energy = player.maxEnergy;
  player.pulse = 1;
  player.magnet = 1.5;
  playSfx("upgrade", 1.1);
  addTrailBurst(24, 1.9);
  showMessage(`裂谷展开到第 ${player.stage} 潜层，目标提升为 ${world.objective} 个孢子。`, 3200);
  flashScreen();
  spores.forEach((spore) => placeSpore(spore));
  setTimeout(() => offerUpgradeChoices(), 650);
  setTimeout(() => { player.gateComplete = false; }, 1200);
}

function offerUpgradeChoices() {
  if (player.upgradeOpen) return;
  player.upgradeOpen = true;
  const options = [...upgradeCatalog]
    .sort(() => Math.random() - 0.5)
    .slice(0, 3);
  upgradeOptions.innerHTML = "";
  options.forEach((upgrade) => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "upgrade-option";
    button.innerHTML = `<b>${upgrade.name}</b><span>${upgrade.text}</span>`;
    button.addEventListener("click", () => {
      playSfx("click", 0.8);
      chooseUpgrade(upgrade);
    }, { once: true });
    upgradeOptions.appendChild(button);
  });
  upgradePanel.classList.add("show");
  comboText.textContent = "选择海沟记忆";
}

function chooseUpgrade(upgrade) {
  upgrade.apply();
  player.upgradeOpen = false;
  upgradePanel.classList.remove("show");
  awardScore(260, upgrade.name);
  playSfx("upgrade", 1);
  showMessage(`${upgrade.name} 已共鸣。`, 1400);
  addTrailBurst(14, 1.45);
  flashScreen();
}

function updateVents(time, delta) {
  vents.forEach((vent) => {
    vent.plume.material.opacity = 0.25 + Math.sin(time * 1.7 + vent.seed) * 0.1;
    vent.plume.scale.y = 8.5 + Math.sin(time * 1.25 + vent.seed) * 1.4;
    const horizontal = Math.hypot(
      player.group.position.x - vent.group.position.x,
      player.group.position.z - vent.group.position.z
    );
    const vertical = Math.abs(player.group.position.y - (vent.group.position.y + 7));
    if (horizontal < 5.8 && vertical < 13) {
      const force = 1 - horizontal / 5.8;
      player.energy = Math.max(0, player.energy - delta * 23 * force);
      player.hazard = Math.max(player.hazard, force);
      tmp.copy(player.group.position).sub(vent.group.position).setY(0).normalize();
      player.velocity.addScaledVector(tmp, delta * 8 * force);
      player.velocity.y += delta * 7 * force;
    }
  });
}

function updateSanctuaries(time, delta) {
  sanctuaries.items.forEach((sanctuary, index) => {
    const horizontal = Math.hypot(
      player.group.position.x - sanctuary.group.position.x,
      player.group.position.z - sanctuary.group.position.z
    );
    const vertical = Math.abs(player.group.position.y - (sanctuary.group.position.y + 8));
    const active = horizontal < 14.5 && vertical < 23 ? 1 : 0;
    sanctuary.active = THREE.MathUtils.lerp(sanctuary.active, active, 1 - Math.pow(0.002, delta));
    sanctuary.ready = Math.max(0, sanctuary.ready - delta);

    sanctuary.ring.rotation.z += delta * (0.22 + sanctuary.active * 1.1);
    sanctuary.ring.material.opacity = 0.18 + sanctuary.active * 0.42 + Math.sin(time * 1.7 + sanctuary.seed) * 0.04;
    sanctuary.aura.material.opacity = 0.12 + sanctuary.active * 0.34 + Math.sin(time * 2.1 + index) * 0.04;
    sanctuary.aura.scale.setScalar(10.5 + sanctuary.active * 5 + Math.sin(time * 1.4 + index) * 0.7);
    sanctuary.fronds.forEach((frond, fIndex) => {
      const wave = Math.sin(time * 2.2 + frond.userData.phase) * (0.12 + sanctuary.active * 0.16);
      frond.rotation.z = Math.cos(frond.userData.angle) * (0.26 + wave);
      frond.rotation.x = -Math.sin(frond.userData.angle) * (0.26 + wave);
      frond.material.opacity = 0.18 + sanctuary.active * 0.3 + Math.sin(time * 2 + fIndex) * 0.03;
    });

    if (active <= 0) return;
    player.energy = Math.min(player.maxEnergy, player.energy + delta * (12 + player.stage * 0.5));
    player.sonarCooldown = Math.max(0, player.sonarCooldown - delta * 1.8);
    player.hazard = Math.max(0, player.hazard - delta * 4.5);
    player.invulnerable = Math.max(player.invulnerable, 0.12);
    storm.intensity = Math.max(0, storm.intensity - delta * 0.035);

    if (sanctuary.ready <= 0) {
      sanctuary.ready = 16;
      awardScore(90, "圣所共鸣");
      reportMission("sanctuary", 1);
      playSfx("upgrade", 0.72);
      if (player.companions < player.companionLimit) player.companions += 1;
      showMessage("圣所回声为你稳定洋流。", 1200);
      addTrailBurst(10, 1.2);
    }
  });
}

function updateCamera(delta) {
  const mobile = innerWidth < 760;
  const distance = mobile ? 26 : 31;
  const height = mobile ? 8.2 : 9.4;
  tmp.set(
    Math.sin(input.yaw) * Math.cos(input.pitch) * distance,
    height + Math.sin(input.pitch) * distance,
    Math.cos(input.yaw) * Math.cos(input.pitch) * distance
  );
  const focus = player.group.position.clone().add(new THREE.Vector3(0, 1.15, 0));
  camera.position.lerp(focus.clone().add(tmp), 1 - Math.pow(0.001, delta));
  const lookFocus = focus.clone().add(getForward().multiplyScalar(7.4 + player.boostHeat * 1.6));
  if (player.cameraShake > 0.001) {
    const shake = player.cameraShake * (mobile ? 0.42 : 0.68);
    cameraShakeOffset.set(
      Math.sin(elapsed * 67 + player.cameraSeed) * shake,
      Math.cos(elapsed * 53 + player.cameraSeed * 1.7) * shake * 0.58,
      Math.sin(elapsed * 47 + player.cameraSeed * 2.1) * shake * 0.36
    );
    camera.position.add(cameraShakeOffset);
    lookFocus.addScaledVector(cameraShakeOffset, 0.18);
    player.cameraShake = Math.max(0, player.cameraShake - delta * (2.25 + player.cameraShake * 2.2));
  }
  camera.lookAt(lookFocus);
}

function updateHud() {
  const energyPct = THREE.MathUtils.clamp(player.energy / player.maxEnergy, 0, 1);
  const energy = Math.round(energyPct * 100);
  energyFill.style.transform = `scaleX(${energyPct})`;
  glowFill.style.transform = `scaleX(${THREE.MathUtils.clamp(player.spores / world.objective, 0, 1)})`;
  comboFill.style.transform = `scaleX(${THREE.MathUtils.clamp(player.comboTimer / tuning.comboWindow, 0, 1)})`;
  energyFill.closest(".status-row").classList.toggle("danger", player.hazard > 0.35 || energyPct < 0.18);
  energyValue.textContent = `${energy}%`;
  sporeValue.textContent = `${Math.min(player.spores, world.objective)}/${world.objective}`;
  comboValue.textContent = `x${player.combo}`;
  const remaining = Math.max(0, world.objective - Math.min(player.spores, world.objective));
  objectiveLabel.innerHTML = player.gateOpened
    ? `回到 <strong>海沟之心</strong>`
    : `第 ${player.stage} 潜层 · 收集 <b>${remaining}</b> 个荧光孢子`;
  if (player.combo <= 1 && player.comboTimer <= 0 && player.energy > 25) {
    if (player.upgradeOpen) {
      comboText.textContent = "选择海沟记忆";
    } else if (storm.intensity > 0.18) {
      comboText.textContent = `风暴强度 ${Math.round(storm.intensity * 100)}%`;
    } else if (player.sonarCooldown > 0) {
      comboText.textContent = `声呐冷却 ${Math.ceil(player.sonarCooldown)}s`;
    } else {
      comboText.textContent = player.companions > 0 ? `共生伙伴 ${player.companions}/${player.companionLimit}` : `第 ${player.stage} 潜层`;
    }
  }
  depthValue.textContent = `${Math.round(900 + Math.max(0, -player.group.position.y) * 7.5)}m`;
  const target = player.gateOpened ? heartGate : nearestSpore();
  if (target) {
    tmp.copy(target.group.position).sub(player.group.position);
    const angle = Math.atan2(tmp.x, tmp.z) + input.yaw;
    radarArrow.style.setProperty("--radar-angle", `${THREE.MathUtils.radToDeg(angle)}deg`);
  }
  radarMarkers.gate.style.display = player.gateOpened ? "block" : "none";
  if (player.gateOpened) placeRadarMarker(radarMarkers.gate, heartGate.group.position, 190);
  predators.predators.forEach((hunter, index) => {
    placeRadarMarker(radarMarkers.predators[index], hunter.position, 145);
  });
  radarMarkers.leviathan.style.display = leviathanState.active ? "block" : "none";
  if (leviathanState.active) placeRadarMarker(radarMarkers.leviathan, leviathan.group.position, 220);
  sanctuaries.items.forEach((sanctuary, index) => {
    placeRadarMarker(radarMarkers.sanctuaries[index], sanctuary.group.position, 180);
  });

  bossStrip.classList.toggle("show", leviathanState.active);
  if (leviathanState.active) {
    bossLabel.textContent = leviathanState.stun > 0 ? "深渊幽影 · 弱点暴露" : "深渊幽影";
    bossFill.style.transform = `scaleX(${THREE.MathUtils.clamp(leviathanState.health / leviathanState.maxHealth, 0, 1)})`;
  }
}

function nearestSpore() {
  let nearest = null;
  let best = Infinity;
  spores.forEach((spore) => {
    if (spore.collected) return;
    const d = spore.group.position.distanceToSquared(player.group.position);
    if (d < best) {
      best = d;
      nearest = spore;
    }
  });
  return nearest;
}

function animateMaterials(time) {
  scene.traverse((object) => {
    if (object.userData.baseOpacity && object.material) {
      object.material.opacity = object.userData.baseOpacity + Math.sin(time * 0.18 + object.id) * 0.032;
    }
  });
}

function addTrailBurst(count = 1, scale = 1) {
  for (let i = 0; i < count; i += 1) {
    const sprite = playerTrail.sprites[playerTrail.index];
    playerTrail.index = (playerTrail.index + 1) % playerTrail.sprites.length;
    sprite.position.copy(player.group.position);
    if (player.velocity.lengthSq() > 0.01) {
      sprite.position.addScaledVector(player.velocity, -0.035 - Math.random() * 0.04);
    }
    sprite.position.x += THREE.MathUtils.randFloatSpread(0.9);
    sprite.position.y += THREE.MathUtils.randFloatSpread(0.7);
    sprite.position.z += THREE.MathUtils.randFloatSpread(0.9);
    sprite.userData.maxLife = THREE.MathUtils.randFloat(0.55, 0.95);
    sprite.userData.life = sprite.userData.maxLife;
    sprite.userData.baseScale = THREE.MathUtils.randFloat(1.2, 2.7) * scale;
    sprite.userData.spin = Math.random() * Math.PI * 2;
    sprite.scale.setScalar(sprite.userData.baseScale);
  }
}

function burstImpact(position, options = {}) {
  const count = options.count ?? 12;
  const scale = options.scale ?? 1;
  const energy = options.energy ?? 1;
  const spread = options.spread ?? 1;
  const color = options.color ?? 0x9ffbff;
  const direction = options.direction && options.direction.lengthSq() > 0.001
    ? options.direction.clone().normalize()
    : null;

  for (let i = 0; i < count; i += 1) {
    const sprite = impactBursts.sprites[impactBursts.index];
    impactBursts.index = (impactBursts.index + 1) % impactBursts.sprites.length;
    const data = sprite.userData;
    sprite.visible = true;
    sprite.position.copy(position);
    sprite.position.x += THREE.MathUtils.randFloatSpread(0.9 * spread);
    sprite.position.y += THREE.MathUtils.randFloatSpread(0.7 * spread);
    sprite.position.z += THREE.MathUtils.randFloatSpread(0.9 * spread);

    tmp2.set(
      THREE.MathUtils.randFloatSpread(1),
      THREE.MathUtils.randFloatSpread(0.82),
      THREE.MathUtils.randFloatSpread(1)
    );
    if (tmp2.lengthSq() < 0.001) tmp2.set(0, 1, 0);
    tmp2.normalize().multiplyScalar(THREE.MathUtils.randFloat(4.5, 14.5) * energy);
    if (direction) tmp2.addScaledVector(direction, THREE.MathUtils.randFloat(2.2, 8.5) * energy);

    data.velocity.copy(tmp2);
    data.maxLife = THREE.MathUtils.randFloat(0.38, data.ring ? 0.78 : 0.62) * (0.85 + scale * 0.16);
    data.life = data.maxLife;
    data.baseScale = THREE.MathUtils.randFloat(data.ring ? 1.6 : 0.45, data.ring ? 3.2 : 1.25) * scale;
    data.spin = Math.random() * Math.PI * 2;
    data.spinSpeed = THREE.MathUtils.randFloat(-3.5, 3.5);
    sprite.material.color.setHex(color);
    sprite.material.opacity = data.ring ? 0.36 : 0.62;
    sprite.scale.setScalar(data.baseScale);
  }
}

function spawnSpeedLines(count = 6, intensity = 1, color = 0x9ffbff) {
  const dir = player.velocity.lengthSq() > 0.08 ? player.velocity.clone().normalize() : getForward().clone();
  const side = new THREE.Vector3().crossVectors(up, dir);
  if (side.lengthSq() < 0.001) side.set(1, 0, 0);
  side.normalize();
  const lift = new THREE.Vector3().crossVectors(dir, side).normalize();

  for (let i = 0; i < count; i += 1) {
    const sprite = speedLines.sprites[speedLines.index];
    speedLines.index = (speedLines.index + 1) % speedLines.sprites.length;
    const data = sprite.userData;
    sprite.visible = true;
    sprite.position.copy(player.group.position)
      .addScaledVector(dir, -THREE.MathUtils.randFloat(2.2, 8.6) * intensity)
      .addScaledVector(side, THREE.MathUtils.randFloatSpread(5.4) * intensity)
      .addScaledVector(lift, THREE.MathUtils.randFloatSpread(3.0) * intensity);
    data.velocity.copy(dir).multiplyScalar(-THREE.MathUtils.randFloat(8.5, 18.5) * intensity);
    data.velocity.addScaledVector(side, THREE.MathUtils.randFloatSpread(1.8));
    data.velocity.addScaledVector(lift, THREE.MathUtils.randFloatSpread(1.2));
    data.maxLife = THREE.MathUtils.randFloat(0.24, 0.44);
    data.life = data.maxLife;
    data.width = THREE.MathUtils.randFloat(0.18, 0.42) * intensity;
    data.height = THREE.MathUtils.randFloat(4.2, 8.8) * intensity;
    data.spin = Math.atan2(side.y + THREE.MathUtils.randFloatSpread(0.5), side.x + THREE.MathUtils.randFloatSpread(0.5));
    sprite.material.color.setHex(color);
    sprite.material.opacity = 0.38;
    sprite.scale.set(data.width, data.height, 1);
    sprite.rotation.z = data.spin;
  }
}

function updateImpactBursts(delta, time) {
  impactBursts.sprites.forEach((sprite) => {
    const data = sprite.userData;
    if (data.life <= 0) return;
    data.life = Math.max(0, data.life - delta);
    const p = data.life / data.maxLife;
    const age = 1 - p;
    sprite.position.addScaledVector(data.velocity, delta);
    data.velocity.multiplyScalar(Math.pow(0.06, delta));
    data.velocity.y += delta * 0.34;
    const scale = data.baseScale * (data.ring ? 0.8 + age * 2.7 : 0.7 + age * 1.35);
    sprite.scale.set(scale, scale, 1);
    sprite.rotation.z = data.spin + time * data.spinSpeed;
    sprite.material.opacity = Math.pow(p, data.ring ? 1.25 : 1.7) * (data.ring ? 0.38 : 0.64);
    if (data.life <= 0) sprite.visible = false;
  });
}

function updateSpeedLines(delta, time) {
  speedLines.sprites.forEach((sprite) => {
    const data = sprite.userData;
    if (data.life <= 0) return;
    data.life = Math.max(0, data.life - delta);
    const p = data.life / data.maxLife;
    const age = 1 - p;
    sprite.position.addScaledVector(data.velocity, delta);
    data.velocity.multiplyScalar(Math.pow(0.18, delta));
    sprite.scale.set(data.width * (0.8 + age * 0.35), data.height * (0.78 + age * 0.55), 1);
    sprite.rotation.z = data.spin + Math.sin(time * 7 + sprite.id) * 0.06;
    sprite.material.opacity = p * p * 0.46;
    if (data.life <= 0) sprite.visible = false;
  });
}

function updateInteractionFocus(time, delta) {
  const target = nearestAudibleObject();
  let active = 0;
  if (target) {
    const distance = Math.sqrt(target.distance);
    active = distance < target.range * 1.08
      ? THREE.MathUtils.clamp(1 - distance / (target.range * 1.08), 0, 1) * target.weight
      : 0;
    if (active > 0) {
      tmp2.copy(target.position);
      tmp2.y += Math.sin(time * 2.7) * 0.18;
      interactionFocus.group.position.lerp(tmp2, 1 - Math.pow(0.004, delta));
    }
  }

  interactionFocus.intensity = THREE.MathUtils.lerp(
    interactionFocus.intensity,
    active,
    1 - Math.pow(active > interactionFocus.intensity ? 0.002 : 0.00008, delta)
  );

  const intensity = interactionFocus.intensity;
  interactionFocus.group.visible = intensity > 0.025;
  if (!interactionFocus.group.visible) return;

  const baseScale = 1.3 + intensity * 2.45 + Math.sin(time * 4.1) * 0.08;
  interactionFocus.group.scale.setScalar(baseScale);
  interactionFocus.halo.material.opacity = 0.08 + intensity * 0.28;
  interactionFocus.halo.scale.setScalar(3.6 + intensity * 3.6);
  interactionFocus.rings.forEach((ring) => {
    const phase = (time * ring.userData.speed + ring.userData.offset) % 1;
    ring.rotation.z += delta * (0.6 + intensity * 1.4);
    ring.scale.setScalar(1 + phase * 0.46 + intensity * 0.16);
    ring.material.opacity = (0.06 + (1 - phase) * 0.24) * intensity;
  });
}

function kickCamera(amount = 0.25) {
  player.cameraShake = Math.min(1.35, player.cameraShake + amount);
}

function flashScreen(kind) {
  screenFlash.classList.toggle("hit", kind === "hit");
  screenFlash.classList.add("show");
  clearTimeout(flashScreen.timer);
  flashScreen.timer = setTimeout(() => {
    screenFlash.classList.remove("show", "hit");
  }, kind === "hit" ? 120 : 90);
}

function resize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  bloom.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 1.6));
}

function showMessage(text, duration = 1600) {
  message.textContent = text;
  message.classList.add("show");
  clearTimeout(showMessage.timer);
  showMessage.timer = setTimeout(() => message.classList.remove("show"), duration);
}

function makeGlowTexture(inner, outer, size = 128) {
  const c = document.createElement("canvas");
  c.width = c.height = size;
  const ctx = c.getContext("2d");
  const gradient = ctx.createRadialGradient(size / 2, size / 2, 2, size / 2, size / 2, size / 2);
  gradient.addColorStop(0, inner);
  gradient.addColorStop(0.22, inner);
  gradient.addColorStop(0.62, outer);
  gradient.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, size, size);
  const texture = new THREE.CanvasTexture(c);
  texture.colorSpace = THREE.SRGBColorSpace;
  return texture;
}

function makeBeamTexture() {
  const width = 160;
  const height = 640;
  const c = document.createElement("canvas");
  c.width = width;
  c.height = height;
  const ctx = c.getContext("2d");
  const h = ctx.createLinearGradient(0, 0, width, 0);
  h.addColorStop(0, "rgba(120,225,255,0)");
  h.addColorStop(0.22, "rgba(120,225,255,.08)");
  h.addColorStop(0.5, "rgba(210,250,255,.7)");
  h.addColorStop(0.78, "rgba(120,225,255,.08)");
  h.addColorStop(1, "rgba(120,225,255,0)");
  ctx.fillStyle = h;
  ctx.fillRect(0, 0, width, height);
  ctx.globalCompositeOperation = "destination-in";
  const v = ctx.createLinearGradient(0, 0, 0, height);
  v.addColorStop(0, "rgba(255,255,255,.9)");
  v.addColorStop(0.45, "rgba(255,255,255,.45)");
  v.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = v;
  ctx.fillRect(0, 0, width, height);
  const texture = new THREE.CanvasTexture(c);
  texture.colorSpace = THREE.SRGBColorSpace;
  return texture;
}

function makeRippleTexture() {
  const c = document.createElement("canvas");
  c.width = c.height = 128;
  const ctx = c.getContext("2d");
  ctx.strokeStyle = "rgba(160, 248, 255, .55)";
  ctx.lineWidth = 2;
  for (let r = 18; r < 62; r += 12) {
    ctx.beginPath();
    ctx.arc(64, 64, r, 0, Math.PI * 2);
    ctx.stroke();
  }
  const texture = new THREE.CanvasTexture(c);
  texture.colorSpace = THREE.SRGBColorSpace;
  return texture;
}

function makeBubbleTexture() {
  const c = document.createElement("canvas");
  c.width = c.height = 96;
  const ctx = c.getContext("2d");
  const gradient = ctx.createRadialGradient(38, 32, 4, 48, 48, 44);
  gradient.addColorStop(0, "rgba(255,255,255,.9)");
  gradient.addColorStop(0.18, "rgba(160,245,255,.42)");
  gradient.addColorStop(0.56, "rgba(120,220,255,.14)");
  gradient.addColorStop(0.82, "rgba(120,220,255,.05)");
  gradient.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(48, 48, 42, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = "rgba(230,255,255,.55)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(48, 48, 35, Math.PI * 1.08, Math.PI * 1.48);
  ctx.stroke();
  const texture = new THREE.CanvasTexture(c);
  texture.colorSpace = THREE.SRGBColorSpace;
  return texture;
}

function makeShardTexture() {
  const c = document.createElement("canvas");
  c.width = c.height = 128;
  const ctx = c.getContext("2d");
  const gradient = ctx.createRadialGradient(64, 64, 4, 64, 64, 60);
  gradient.addColorStop(0, "rgba(255,255,255,.95)");
  gradient.addColorStop(0.18, "rgba(255,209,130,.72)");
  gradient.addColorStop(0.48, "rgba(118,255,210,.28)");
  gradient.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 128, 128);
  ctx.strokeStyle = "rgba(255,255,255,.55)";
  ctx.lineWidth = 2;
  for (let i = 0; i < 4; i += 1) {
    ctx.beginPath();
    ctx.moveTo(64, 10 + i * 8);
    ctx.lineTo(90 - i * 8, 64);
    ctx.lineTo(64, 118 - i * 8);
    ctx.lineTo(38 + i * 8, 64);
    ctx.closePath();
    ctx.stroke();
  }
  const texture = new THREE.CanvasTexture(c);
  texture.colorSpace = THREE.SRGBColorSpace;
  return texture;
}

function makeSparkTexture() {
  const size = 96;
  const c = document.createElement("canvas");
  c.width = c.height = size;
  const ctx = c.getContext("2d");
  const gradient = ctx.createRadialGradient(size / 2, size / 2, 1, size / 2, size / 2, size / 2);
  gradient.addColorStop(0, "rgba(255,255,255,.96)");
  gradient.addColorStop(0.16, "rgba(220,255,255,.78)");
  gradient.addColorStop(0.42, "rgba(126,243,255,.32)");
  gradient.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, size, size);
  ctx.strokeStyle = "rgba(255,255,255,.55)";
  ctx.lineWidth = 1.4;
  for (let i = 0; i < 4; i += 1) {
    const angle = (i / 4) * Math.PI;
    ctx.beginPath();
    ctx.moveTo(size / 2 + Math.cos(angle) * 7, size / 2 + Math.sin(angle) * 7);
    ctx.lineTo(size / 2 + Math.cos(angle) * 38, size / 2 + Math.sin(angle) * 38);
    ctx.stroke();
  }
  const texture = new THREE.CanvasTexture(c);
  texture.colorSpace = THREE.SRGBColorSpace;
  return texture;
}

function makeStreakTexture() {
  const width = 64;
  const height = 256;
  const c = document.createElement("canvas");
  c.width = width;
  c.height = height;
  const ctx = c.getContext("2d");
  const h = ctx.createLinearGradient(0, 0, width, 0);
  h.addColorStop(0, "rgba(255,255,255,0)");
  h.addColorStop(0.48, "rgba(255,255,255,.78)");
  h.addColorStop(0.52, "rgba(255,255,255,.78)");
  h.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = h;
  ctx.fillRect(0, 0, width, height);
  ctx.globalCompositeOperation = "destination-in";
  const v = ctx.createLinearGradient(0, 0, 0, height);
  v.addColorStop(0, "rgba(255,255,255,0)");
  v.addColorStop(0.2, "rgba(255,255,255,.28)");
  v.addColorStop(0.55, "rgba(255,255,255,.9)");
  v.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = v;
  ctx.fillRect(0, 0, width, height);
  const texture = new THREE.CanvasTexture(c);
  texture.colorSpace = THREE.SRGBColorSpace;
  return texture;
}

function noise(value) {
  const n = Math.sin(value * 12.9898) * 43758.5453;
  return n - Math.floor(n);
}
