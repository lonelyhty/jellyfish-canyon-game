<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>蓝潮裂谷 - 深海水母漫游</title>
  <style>
    html, body, iframe {
      width: 100%;
      height: 100%;
      margin: 0;
      border: 0;
      background: #010711;
      display: block;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <iframe id="gameFrame" title="蓝潮裂谷" allow="autoplay; fullscreen"></iframe>
  <script>
    const sessionKey = "jellyfishPortalSession";
    const serverId = "blue-rift";
    const scene = {
      serverId,
      sceneId: serverId,
      serverName: "一区 · 蓝潮裂谷",
      sceneName: "蓝潮裂谷",
      region: "华东",
      depth: 938,
      issuedAt: Date.now()
    };
    try {
      const current = JSON.parse(sessionStorage.getItem(sessionKey) || localStorage.getItem(sessionKey) || "{}");
      const next = { ...current, ...scene };
      sessionStorage.setItem(sessionKey, JSON.stringify(next));
      localStorage.setItem(sessionKey, JSON.stringify(next));
    } catch {}
    document.querySelector("#gameFrame").src = "./jellyfish-cdn.html?scene=blue-rift&server=blue-rift";
  </script>
</body>
</html>
